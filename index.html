const { useState, useEffect, useCallback } = React;

// ─── Persistent Storage Hook ────────────────────────
function usePersist(key, initial) {
  const [val, setVal] = useState(() => {
    try { const s = localStorage.getItem(key); return s ? JSON.parse(s) : initial; } catch(e) { return initial; }
  });
  const setPersist = useCallback((v) => {
    setVal(prev => {
      const next = typeof v === "function" ? v(prev) : v;
      try { localStorage.setItem(key, JSON.stringify(next)); } catch(e) {}
      return next;
    });
  }, [key]);
  return [val, setPersist, true];
}

// ─── Floating Hearts ────────────────────────────────
function FloatingHearts() {
  return <div style={{position:"absolute",top:0,left:0,right:0,bottom:0,pointerEvents:"none",overflow:"hidden"}}>
    {[0,1,2].map(i=>
      <div key={i} style={{
        position:"absolute",left:`${40+i*10}%`,bottom:0,fontSize:14+i*4,
        animation:`floatUp ${4+i*1.5}s ease-in-out ${i*1.2}s infinite`,opacity:0,
      }}>💕</div>
    )}
  </div>;
}

    {sub&&<p style={{fontFamily:"'Gowun Batang','Nanum Myeongjo',serif",fontSize:13,color:C.textLight}}>{sub}</p>}
  </div>;
}

  return <nav style={{position:"fixed",bottom:0,left:0,right:0,zIndex:100,background:"rgba(253,246,240,0.92)",backdropFilter:"blur(16px)",borderTop:"1px solid rgba(232,120,138,0.08)",display:"flex",justifyContent:"space-around",padding:"6px 0 env(safe-area-inset-bottom, 8px)"}}>
    {tabs.map(t=><button key={t.id} onClick={()=>setActive(t.id)} style={{background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:1,padding:"5px 14px",borderRadius:14,opacity:active===t.id?1:0.4,transform:active===t.id?"scale(1.08)":"scale(1)",transition:"all 0.3s cubic-bezier(.4,0,.2,1)"}}>
      <span style={{fontSize:20}}>{t.i}</span>
      <span style={{fontSize:9,fontFamily:"'Gowun Batang','Nanum Myeongjo',serif",color:active===t.id?C.pink:C.textLight,fontWeight:active===t.id?800:600}}>{t.l}</span>
    </button>)}
  </nav>;
}

// ─── HOME ───────────────────────────────────────────
function HomePage({pts,addPts,me,setMe}){
  const [daysPassed,setDP]=useState(0);
  const [daysLeft,setDL]=useState(0);
  const [quote,setQ]=usePersist("home-quote","매일이 너와의 첫날 같고,\n매일이 너와의 영원 같아.");
  const [quoteBy,setQB]=usePersist("home-quoteBy","아시모");
  const [editing,setE]=useState(false);
  const [editText,setET]=useState("");
  const [quotePtsToday,setQPT]=useState(0);
  const [hearts,setHearts]=useState([]);
  const [heartToday,setHT]=useState(0);
  const [ptsAnim,setPA]=useState([]);
  
  useEffect(()=>{
    const n=new Date();
    setDP(Math.floor((n-WEDDING_DATE)/864e5));
    setDL(Math.max(0,Math.floor((HUNDRED-n)/864e5)));
  },[]);

  // 아시모를 누르면 → 토끼 눈에서 출발 → 아시모에게 날아감 → 아시모 +1
  // 토끼를 누르면 → 아시모 눈에서 출발 → 토끼에게 날아감 → 토끼 +1
  const shootHeart=(target,e)=>{
    e.stopPropagation();
    const id=Date.now()+Math.random();
    const emojis=["💕","💗","💖","💘","💝","♥️","🩷"];
    const em=emojis[Math.floor(Math.random()*emojis.length)];
    // target=asimo → starts from bunny(left), flies right
    // target=bunny → starts from asimo(right), flies left
    const dir=target==="asimo"?"R":"L";
    setHearts(p=>[...p,{id,em,dir,target}]);
    if(heartToday<5){
      addPts(1);
      setHT(p=>p+1);
      const pid=id+0.1;
      setPA(p=>[...p,{id:pid,target}]);
      setTimeout(()=>setPA(p=>p.filter(h=>h.id!==pid)),800);
    }
    setTimeout(()=>setHearts(p=>p.filter(h=>h.id!==id)),1200);
  };

  const saveQuote=()=>{if(editText.trim()){setQ(editText.trim());if(quotePtsToday<5){addPts(5);setQPT(p=>p+5);}}setE(false);};

  // Eye positions tuned to the proposal illustration
  // Bunny sits left: eyes ~32% from left, ~48% from top
  // Asimo kneels right: eyes ~66% from left, ~43% from top
  const EYE={bunny:{left:"32%",top:"48%"},asimo:{left:"56%",top:"43%"}};

  return <div style={{height:"100dvh",background:C.bg,position:"relative",overflow:"hidden",display:"flex",flexDirection:"column"}}>
    {/* Hero Image */}
    <div style={{position:"relative",flex:1,overflow:"hidden"}}>
      <div style={{
        position:"absolute",inset:0,
        backgroundImage:`url(${PROPOSAL_IMG})`,
        backgroundSize:"cover",backgroundPosition:"center 25%",
        transform:"scale(1.05)",
      }}/>
      
      {/* Top bar: counters + user toggle */}
      <div style={{position:"absolute",top:0,left:0,right:0,padding:"48px 16px 0",zIndex:5,display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
        <div style={{display:"flex",gap:14,alignItems:"center"}}>
          <div style={{textAlign:"center"}}>
            <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:28,fontWeight:300,color:"white",lineHeight:1,textShadow:"0 2px 10px rgba(0,0,0,0.35)"}}>{daysPassed.toLocaleString()}</div>
            <div style={{fontSize:10,color:"rgba(255,255,255,0.8)",fontFamily:"'Gowun Batang','Nanum Myeongjo',serif",fontWeight:700,marginTop:2,textShadow:"0 1px 4px rgba(0,0,0,0.3)"}}>함께한 날</div>
          </div>
          <div style={{fontSize:10,color:"rgba(255,255,255,0.6)",textShadow:"0 1px 4px rgba(0,0,0,0.3)"}}>♥</div>
          <div style={{textAlign:"center"}}>
            <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:28,fontWeight:300,color:"rgba(255,255,255,0.85)",lineHeight:1,textShadow:"0 2px 10px rgba(0,0,0,0.3)"}}>{daysLeft.toLocaleString()}</div>
            <div style={{fontSize:10,color:"rgba(255,255,255,0.75)",fontFamily:"'Gowun Batang','Nanum Myeongjo',serif",fontWeight:700,marginTop:2,textShadow:"0 1px 4px rgba(0,0,0,0.3)"}}>남은 날</div>
          </div>
        </div>
        {/* Current user toggle */}
        <button onClick={()=>setMe(me==="asimo"?"bunny":"asimo")} style={{
          background:"rgba(255,255,255,0.2)",backdropFilter:"blur(6px)",borderRadius:16,padding:"8px 16px",
          border:"1px solid rgba(255,255,255,0.15)",cursor:"pointer",display:"flex",alignItems:"center",gap:6,marginTop:4,
        }}>
          <span style={{fontSize:22}}>{me==="asimo"?"🤖":"🐰"}</span>
          <span style={{fontFamily:"'Gowun Batang','Nanum Myeongjo',serif",fontSize:13,fontWeight:800,color:"white",textShadow:"0 1px 4px rgba(0,0,0,0.3)"}}>{me==="asimo"?"아시모":"토끼"}</span>
        </button>
      </div>

      {/* Points badges above characters */}
      <div style={{position:"absolute",left:"20%",top:"26%",zIndex:6,pointerEvents:"none",transform:"translateX(-50%)"}}>
        <div style={{background:"rgba(255,255,255,0.25)",backdropFilter:"blur(6px)",borderRadius:18,padding:"6px 14px",display:"inline-flex",alignItems:"center",gap:5,border:"1px solid rgba(255,255,255,0.2)"}}>
          <span style={{fontSize:18}}>🐰</span>
          <span style={{fontFamily:"'Gowun Batang','Nanum Myeongjo',serif",fontSize:16,fontWeight:900,color:"white",textShadow:"0 1px 6px rgba(0,0,0,0.35)"}}>{pts.bunny.toLocaleString()}</span>
        </div>
      </div>
      <div style={{position:"absolute",left:"72%",top:"22%",zIndex:6,pointerEvents:"none",transform:"translateX(-50%)"}}>
        <div style={{background:"rgba(255,255,255,0.25)",backdropFilter:"blur(6px)",borderRadius:18,padding:"6px 14px",display:"inline-flex",alignItems:"center",gap:5,border:"1px solid rgba(255,255,255,0.2)"}}>
          <span style={{fontSize:18}}>🤖</span>
          <span style={{fontFamily:"'Gowun Batang','Nanum Myeongjo',serif",fontSize:16,fontWeight:900,color:"white",textShadow:"0 1px 6px rgba(0,0,0,0.35)"}}>{pts.asimo.toLocaleString()}</span>
        </div>
      </div>

      {/* Tap zones - tap a character to send them love */}
      {/* Left = bunny area: tap → asimo's eyes shoot heart → bunny gets pt */}
      <div onClick={(e)=>shootHeart("bunny",e)} style={{position:"absolute",left:0,top:"30%",width:"48%",bottom:"30%",zIndex:4,cursor:"pointer"}}/>
      {/* Right = asimo area: tap → bunny's eyes shoot heart → asimo gets pt */}
      <div onClick={(e)=>shootHeart("asimo",e)} style={{position:"absolute",right:0,top:"30%",width:"48%",bottom:"30%",zIndex:4,cursor:"pointer"}}/>

      {/* Flying hearts - start from OPPOSITE character's eyes, fly to target */}
      {hearts.map(h=>{
        // target=asimo → starts from bunny eyes (left), flies R
        // target=bunny → starts from asimo eyes (right), flies L
        const from=h.target==="asimo"?EYE.bunny:EYE.asimo;
        return <div key={h.id} style={{
          position:"absolute",
          left:from.left,top:from.top,
          fontSize:24,pointerEvents:"none",zIndex:10,
          animation:`heartArc${h.dir} 1.1s cubic-bezier(.25,.46,.45,.94) forwards`,
        }}>{h.em}</div>;
      })}
      {/* +1 popups above target */}
      {ptsAnim.map(p=>(
        <div key={p.id} style={{
          position:"absolute",
          left:p.target==="asimo"?"62%":"20%",
          top:p.target==="asimo"?"16%":"20%",
          pointerEvents:"none",zIndex:11,
          fontFamily:"'Gowun Batang','Nanum Myeongjo',serif",fontSize:15,fontWeight:900,color:"#ff6b8a",
          animation:"ptsPop 0.8s ease-out forwards",
          textShadow:"0 2px 8px rgba(255,255,255,0.6), 0 1px 4px rgba(0,0,0,0.2)",
        }}>+1</div>
      ))}

      {/* Top gradient */}
      <div style={{position:"absolute",top:0,left:0,right:0,height:"18%",background:"linear-gradient(rgba(0,0,0,0.35), transparent)",pointerEvents:"none"}}/>
      {/* Bottom fade */}
      <div style={{position:"absolute",bottom:0,left:0,right:0,height:"20%",
        background:`linear-gradient(transparent, ${C.bg})`,pointerEvents:"none",
      }}/>
      {/* Title */}
      <div style={{position:"absolute",bottom:40,left:0,right:0,textAlign:"center",zIndex:3,pointerEvents:"none"}}>
        <h1 style={{fontFamily:"'Cormorant Garamond',serif",fontSize:22,fontWeight:300,color:C.text,margin:0,letterSpacing:1,fontStyle:"italic"}}>
          아시모 <span style={{color:C.pink,fontSize:18}}>♥</span> 토끼
        </h1>
        <div style={{fontSize:9,color:C.gold,fontFamily:"'Cormorant Garamond',serif",fontWeight:400,marginTop:0,letterSpacing:3}}>
          Since March 29, 2025
        </div>
      </div>
    </div>

    {/* Bottom - quote */}
    <div style={{flexShrink:0,padding:"2px 16px",paddingBottom:36,position:"relative",zIndex:2,marginTop:-30}}>
      {editing?
        <div style={{padding:"8px 12px",borderRadius:14,background:"white",boxShadow:"0 2px 12px rgba(232,120,138,0.06)"}}>
          <textarea value={editText} onChange={e=>setET(e.target.value)} autoFocus rows={2}
            style={{width:"100%",background:C.warm,border:"none",outline:"none",resize:"none",borderRadius:10,padding:8,
              fontFamily:"'Cormorant Garamond',serif",fontSize:16,color:C.text,lineHeight:1.5,textAlign:"center",fontStyle:"italic"}}/>
          <div style={{display:"flex",justifyContent:"center",gap:4,marginTop:4}}>
            {["아시모","토끼"].map(n=>
              <button key={n} onClick={()=>setQB(n)} style={{padding:"2px 10px",borderRadius:10,border:"none",cursor:"pointer",fontSize:9,fontWeight:700,
                background:quoteBy===n?C.pinkPale:C.warm,color:quoteBy===n?C.pink:C.textLight,fontFamily:"'Gowun Batang','Nanum Myeongjo',serif"}}>{n}</button>
            )}
            <button onClick={()=>setE(false)} style={{padding:"2px 10px",borderRadius:10,border:`1px solid ${C.pinkLight}`,background:"none",color:C.textLight,fontSize:9,cursor:"pointer",fontFamily:"'Gowun Batang','Nanum Myeongjo',serif",fontWeight:700}}>취소</button>
            <button onClick={saveQuote} style={{padding:"2px 10px",borderRadius:10,border:"none",background:C.pink,color:"white",fontSize:9,cursor:"pointer",fontFamily:"'Gowun Batang','Nanum Myeongjo',serif",fontWeight:700}}>저장</button>
          </div>
        </div>
      :
        <div onClick={()=>{setET(quote);setE(true);}} style={{padding:"6px 14px",borderRadius:12,background:"white",boxShadow:"0 2px 12px rgba(232,120,138,0.04)",textAlign:"center",cursor:"pointer",border:"1px solid rgba(232,120,138,0.04)"}}>
          <p style={{fontFamily:"'Cormorant Garamond',serif",fontSize:14,color:C.text,lineHeight:1.4,margin:0,fontStyle:"italic",whiteSpace:"pre-line"}}>"{quote}"</p>
          <div style={{fontSize:9,color:C.gold,marginTop:1,fontFamily:"'Cormorant Garamond',serif",letterSpacing:1}}>— {quoteBy}가 {quoteBy==="아시모"?"토끼":"아시모"}에게</div>
        </div>
      }
    </div>
  </div>;
}

// ─── MEMORIES ───────────────────────────────────────
function MemoriesPage({addPts}){
  const [tab,setTab]=useState("wedding");
  // Wedding: simple photo list (URLs or placeholders)
  const [photos,setPhotos]=usePersist("mem-photos",[]);
  const [lightbox,setLB]=useState(null); // number for wedding, {tripId,idx} for travel

  // Travel: trips sorted by date
  const [trips,setTrips]=usePersist("mem-trips",defaultTrips);
  const [adding,setAdding]=useState(false);
  const [newTrip,setNT]=useState({date:"",year:"",month:"",country:"",city:"",note:""});
  const [selTrip,setSelTrip]=useState(null);

  // Dates
  const [dates,setDates]=usePersist("mem-dates",[]);
  const [addingDate,setAD]=useState(false);
  const [newDate,setND]=useState({date:"",year:"",month:"",day:"",place:"",note:""});
  const [selDate,setSelDate]=useState(null);
  const [editMode,setEM]=useState(false);

  const delPhoto=(idx)=>setPhotos(p=>p.filter((_,i)=>i!==idx));
  const delDate=(id)=>{setDates(p=>p.filter(d=>d.id!==id));setSelDate(null);};
  const delDateMedia=(dateId,mediaIdx)=>setDates(p=>p.map(d=>d.id===dateId?{...d,media:(d.media||[]).filter((_,i)=>i!==mediaIdx)}:d));
  const delTripMedia=(tripId,mediaIdx)=>setTrips(p=>p.map(t=>t.id===tripId?{...t,media:(t.media||[]).filter((_,i)=>i!==mediaIdx)}:t));
  const sorted=[...trips].sort((a,b)=>b.date.localeCompare(a.date));
  const countries=[...new Set(trips.map(t=>t.country))];

  const addTrip=()=>{
    if(!newTrip.date||!newTrip.country||!newTrip.city)return;
    setTrips(p=>[...p,{id:Date.now(),date:newTrip.date,country:newTrip.country,city:newTrip.city,note:newTrip.note,media:[]}]);
    setNT({date:"",year:"",month:"",country:"",city:"",note:""});
    setAdding(false);
  };

  const addDate=()=>{
    if(!newDate.date||!newDate.place)return;
    setDates(p=>[...p,{id:Date.now(),date:newDate.date,place:newDate.place,note:newDate.note,media:[]}]);
    setND({date:"",year:"",month:"",day:"",place:"",note:""});
    setAD(false);
  };

  const sortedDates=[...dates].sort((a,b)=>b.date.localeCompare(a.date));

  const removeTrip=(id)=>{
    setTrips(p=>p.filter(t=>t.id!==id));
    setSelTrip(null);
  };

  const F="'Gowun Batang','Nanum Myeongjo',serif";

  return <PW>
    <div style={{display:"flex",justifyContent:"center",gap:6,marginBottom:8,position:"relative"}}>
      {[{id:"wedding",l:"결혼식",e:"💍"},{id:"dates",l:"데이트",e:"💑"},{id:"travel",l:"여행",e:"✈️"}].map(t=><button key={t.id} onClick={()=>{setTab(t.id);setEM(false);}} style={{padding:"8px 16px",borderRadius:16,fontSize:13,cursor:"pointer",fontFamily:F,border:"none",fontWeight:tab===t.id?800:600,background:tab===t.id?C.pink:"white",color:tab===t.id?"white":C.textLight,transition:"all 0.3s ease",boxShadow:tab===t.id?`0 4px 16px ${C.pinkLight}`:"none"}}>{t.e} {t.l}</button>)}
      <button onClick={()=>setEM(!editMode)} style={{position:"absolute",right:0,top:"50%",transform:"translateY(-50%)",padding:"5px 10px",borderRadius:10,border:"none",cursor:"pointer",fontFamily:F,fontSize:11,fontWeight:700,background:editMode?C.pink+"22":C.warm,color:editMode?C.pink:C.textSoft}}>{editMode?"완료":"수정"}</button>
    </div>

    {tab==="wedding"&&<>
      <SH emoji="💍" title="우리의 결혼식" sub="2025. 03. 29"/>

      {photos.length>0&&<div style={{textAlign:"center",marginBottom:12}}>
        <span style={{fontFamily:F,fontSize:13,color:C.textLight,fontWeight:700}}>{photos.length}장의 추억</span>
      </div>}

      {/* Photo grid */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6}}>
        {photos.map((p,i)=>(
          <div key={i} style={{aspectRatio:"1",borderRadius:12,overflow:"hidden",cursor:"pointer",background:`url(${p}) center/cover`,transition:"all 0.2s ease",position:"relative"}}
            onClick={()=>!editMode&&setLB(i)}>
            {editMode&&<div onClick={(e)=>{e.stopPropagation();delPhoto(i);}} style={{position:"absolute",inset:0,background:"rgba(0,0,0,0.4)",display:"flex",alignItems:"center",justifyContent:"center"}}>
              <span style={{fontFamily:F,fontSize:12,fontWeight:700,color:"white",background:C.pink,padding:"4px 10px",borderRadius:8}}>삭제</span>
            </div>}
          </div>
        ))}
        {/* Upload placeholder */}
        <label style={{
          aspectRatio:"1",borderRadius:12,
          border:`2px dashed ${C.pinkLight}`,
          display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",
          cursor:"pointer",background:C.pinkPale+"44",
        }}>
          <span style={{fontSize:22,color:C.pink}}>+</span>
          <span style={{fontFamily:F,fontSize:9,color:C.pink,fontWeight:700}}>사진 추가</span>
          <input type="file" accept="image/*" multiple hidden onChange={e=>{
            const files=Array.from(e.target.files||[]);
            files.forEach(f=>{
              const reader=new FileReader();
              reader.onload=ev=>{setPhotos(p=>[...p,ev.target.result]);addPts(10);};
              reader.readAsDataURL(f);
            });
          }}/>
        </label>
      </div>

      {/* Empty state */}
      {photos.length===0&&<div style={{textAlign:"center",padding:"30px 0"}}>
        <span style={{fontSize:40,display:"block",marginBottom:8}}>📸</span>
        <p style={{fontFamily:F,fontSize:13,color:C.textLight,fontWeight:600}}>결혼식 사진을 추가해주세요</p>
        <p style={{fontFamily:F,fontSize:11,color:C.textSoft}}>위의 + 버튼으로 사진을 올릴 수 있어요</p>
      </div>}

      {/* Lightbox */}
      {typeof lightbox==="number"&&<div onClick={()=>setLB(null)} style={{
        position:"fixed",inset:0,zIndex:200,background:"rgba(0,0,0,0.85)",
        display:"flex",alignItems:"center",justifyContent:"center",padding:20,cursor:"pointer",
      }}>
        <img src={photos[lightbox]} style={{maxWidth:"100%",maxHeight:"80vh",borderRadius:12,objectFit:"contain"}} onClick={e=>e.stopPropagation()}/>
        {/* Nav arrows */}
        {lightbox>0&&<button onClick={e=>{e.stopPropagation();setLB(lightbox-1);}} style={{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)",background:"rgba(255,255,255,0.2)",border:"none",borderRadius:"50%",width:36,height:36,cursor:"pointer",color:"white",fontSize:18}}>‹</button>}
        {lightbox<photos.length-1&&<button onClick={e=>{e.stopPropagation();setLB(lightbox+1);}} style={{position:"absolute",right:12,top:"50%",transform:"translateY(-50%)",background:"rgba(255,255,255,0.2)",border:"none",borderRadius:"50%",width:36,height:36,cursor:"pointer",color:"white",fontSize:18}}>›</button>}
        <div style={{position:"absolute",bottom:24,fontFamily:F,fontSize:12,color:"rgba(255,255,255,0.6)"}}>{lightbox+1} / {photos.length}</div>
      </div>}

    </>}

    {tab==="dates"&&<>
      <SH emoji="💑" title="우리의 데이트" sub={dates.length>0?`${dates.length}번의 데이트`:"소중한 데이트를 기록해요"}/>

      {addingDate?<div style={{background:"white",borderRadius:20,padding:18,marginBottom:16,boxShadow:"0 4px 20px rgba(200,162,255,0.1)",border:`1px solid ${C.purpleLight}22`}}>
        <div style={{fontFamily:F,fontSize:18,fontWeight:800,color:C.text,marginBottom:14}}>💑 새 데이트 추가</div>
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          <div>
            <div style={{fontFamily:F,fontSize:10,color:C.textLight,fontWeight:700,marginBottom:5}}>언제?</div>
            <div style={{display:"flex",gap:6}}>
              <select value={newDate.year||""} onChange={e=>setND(p=>({...p,year:e.target.value,date:e.target.value&&p.month&&p.day?`${e.target.value}-${p.month}-${p.day}`:""}))}
                style={{flex:1,padding:"10px 12px",borderRadius:14,border:`1px solid ${C.purpleLight}44`,outline:"none",fontFamily:F,fontSize:13,fontWeight:700,background:C.warm,color:C.text,appearance:"none",textAlign:"center",cursor:"pointer"}}>
                <option value="" disabled>년도</option>
                {Array.from({length:6},(_,i)=>2025+i).map(y=><option key={y} value={y}>{y}년</option>)}
              </select>
              <select value={newDate.month||""} onChange={e=>setND(p=>({...p,month:e.target.value,date:p.year&&e.target.value&&p.day?`${p.year}-${e.target.value}-${p.day}`:""}))}
                style={{flex:1,padding:"10px 12px",borderRadius:14,border:`1px solid ${C.purpleLight}44`,outline:"none",fontFamily:F,fontSize:13,fontWeight:700,background:C.warm,color:C.text,appearance:"none",textAlign:"center",cursor:"pointer"}}>
                <option value="" disabled>월</option>
                {Array.from({length:12},(_,i)=>String(i+1).padStart(2,"0")).map(m=><option key={m} value={m}>{parseInt(m)}월</option>)}
              </select>
              <select value={newDate.day||""} onChange={e=>setND(p=>({...p,day:e.target.value,date:p.year&&p.month&&e.target.value?`${p.year}-${p.month}-${e.target.value}`:""}))}
                style={{flex:1,padding:"10px 12px",borderRadius:14,border:`1px solid ${C.purpleLight}44`,outline:"none",fontFamily:F,fontSize:13,fontWeight:700,background:C.warm,color:C.text,appearance:"none",textAlign:"center",cursor:"pointer"}}>
                <option value="" disabled>일</option>
                {Array.from({length:31},(_,i)=>String(i+1).padStart(2,"0")).map(d=><option key={d} value={d}>{parseInt(d)}일</option>)}
              </select>
            </div>
          </div>
          <div>

                  const files=Array.from(e.target.files||[]);

      {lightbox?.tripId!=null&&(()=>{

            <span style={{fontFamily:F,fontSize:14,fontWeight:800,color:"white",textShadow:"0 2px 8px rgba(0,0,0,0.5)"}}>{t.city} · {t.country}</span>

        </div>;
      })()}
    </>}
  </PW>;
}

// ─── WISHES ─────────────────────────────────────────
function WishesPage({addPts,me}){
  const [tab,setTab]=useState("daily");
  const [wishes,setW]=usePersist("wish-list",defaultWishlist);
  const [wt,setWT]=useState("eat");
  const [buckets,setB]=usePersist("wish-buckets",{"~2030":[],"~2040":[],"~2050":[],"~2060":[],"~2070":[],"~2080":[],"~2090":[]});
  const [bt,setBT]=useState("~2030");
  const [promises,setPM]=usePersist("wish-promises",[]);
  const [showDone,setSD]=useState(false);
  const [addingW,setAW]=useState(false);
  const [newW,setNW]=useState("");
  const [newWLink,setNWL]=useState("");
  const [addingB,setAB]=useState(false);
  const [newB,setNB]=useState("");
  const [addingP,setAP]=useState(false);
  const [editMode,setEM]=useState(false);
  const [newP,setNP]=useState("");
  const F="'Gowun Batang','Nanum Myeongjo',serif";
  const myLabel=me==="asimo"?"아시모":"토끼";
  const partnerLabel=me==="asimo"?"토끼":"아시모";
  const cats=[{id:"eat",l:"먹고 싶은 것",e:"🍽️",c:C.pink},{id:"go",l:"가보고 싶은 곳",e:"📍",c:C.purple},{id:"do",l:"해보고 싶은 것",e:"🎯",c:C.mint}];
  const cc=cats.find(c=>c.id===wt);

  // Wish CRUD
  const addWish=()=>{if(!newW.trim())return;setW(p=>({...p,[wt]:[...p[wt],{id:Date.now(),text:newW.trim(),link:newWLink.trim()||null,done:false,addedBy:myLabel}]}));addPts(10);setNW("");setNWL("");setAW(false);};
  const toggleWish=(id)=>{const item=wishes[wt].find(x=>x.id===id);if(item&&!item.done)addPts(100);setW(p=>({...p,[wt]:p[wt].map(x=>x.id===id?{...x,done:!x.done}:x)}));};
  const delWish=(id)=>setW(p=>({...p,[wt]:p[wt].filter(x=>x.id!==id)}));

  // Bucket CRUD + reorder
  const addBucket=()=>{if(!newB.trim())return;setB(p=>({...p,[bt]:[...p[bt],{id:Date.now(),text:newB.trim(),done:false,addedBy:myLabel}]}));addPts(10);setNB("");setAB(false);};
  const toggleBucket=(id)=>{const item=buckets[bt].find(x=>x.id===id);if(item&&!item.done)addPts(1000);setB(p=>({...p,[bt]:p[bt].map(x=>x.id===id?{...x,done:!x.done}:x)}));};
  const delBucket=(id)=>setB(p=>({...p,[bt]:p[bt].filter(x=>x.id!==id)}));
  const delPromise=(id)=>setPM(p=>p.filter(x=>x.id!==id));
  const moveBucket=(id,dir)=>{
    setB(p=>{const list=[...p[bt]];const i=list.findIndex(x=>x.id===id);const j=i+dir;
    if(j<0||j>=list.length)return p;[list[i],list[j]]=[list[j],list[i]];return{...p,[bt]:list};});
  };

  // Promise CRUD
  const addPromise=()=>{if(!newP.trim())return;setPM(p=>[...p,{id:Date.now(),text:newP.trim(),addedBy:myLabel,doneAsimo:false,doneBunny:false}]);addPts(10);setNP("");setAP(false);};
  const togglePromise=(id)=>{
    const meKey=me==="asimo"?"doneAsimo":"doneBunny";
    const item=promises.find(x=>x.id===id);
    if(item&&!item[meKey])addPts(100);
    setPM(p=>p.map(x=>x.id===id?{...x,[meKey]:!x[meKey]}:x));
  };

  const pending=wishes[wt].filter(x=>!x.done);
  const done=wishes[wt].filter(x=>x.done);
  const bList=buckets[bt]||[];
  const bPending=bList.filter(x=>!x.done);
  const bDone=bList.filter(x=>x.done);
  const bAllTotal=Object.values(buckets).flat().length;
  const bAllDone=Object.values(buckets).flat().filter(x=>x.done).length;
  const pActive=promises.filter(x=>!x.doneAsimo||!x.doneBunny);
  const pComplete=promises.filter(x=>x.doneAsimo&&x.doneBunny);

  const PersonTag=({name})=><span style={{fontSize:10,padding:"2px 8px",borderRadius:8,fontFamily:F,fontWeight:700,
    background:name==="아시모"?C.blueLight:C.pinkPale,color:C.text}}>{name}</span>;

  const tabs=[{id:"daily",l:"위시",e:"✨"},{id:"promise",l:"약속",e:"🤝"},{id:"bucket",l:"버킷",e:"🪣"}];

  return <PW>
    <div style={{display:"flex",justifyContent:"center",gap:6,marginBottom:8,position:"relative"}}>
      {tabs.map(t=><button key={t.id} onClick={()=>{setTab(t.id);setSD(false);setEM(false);}} style={{padding:"8px 16px",borderRadius:16,fontSize:13,cursor:"pointer",fontFamily:F,border:"none",fontWeight:tab===t.id?800:600,background:tab===t.id?C.pink:"white",color:tab===t.id?"white":C.textLight,transition:"all 0.3s ease",boxShadow:tab===t.id?`0 4px 16px ${C.pinkLight}`:"none"}}>{t.e} {t.l}</button>)}
      <button onClick={()=>setEM(!editMode)} style={{position:"absolute",right:0,top:"50%",transform:"translateY(-50%)",padding:"5px 10px",borderRadius:10,border:"none",cursor:"pointer",fontFamily:F,fontSize:11,fontWeight:700,background:editMode?C.pink+"22":C.warm,color:editMode?C.pink:C.textSoft}}>{editMode?"완료":"수정"}</button>
    </div>

    {/* ── 데이트 위시 ── */}
    {tab==="daily"&&<>
      <SH emoji="✨" title="데이트 위시리스트" sub="같이 먹고, 가고, 해보고 싶은 것들"/>
      <div style={{display:"flex",gap:6,marginBottom:16}}>
        {cats.map(cat=><button key={cat.id} onClick={()=>setWT(cat.id)} style={{flex:1,padding:"9px 4px",borderRadius:14,fontSize:12,cursor:"pointer",fontFamily:F,border:"none",fontWeight:wt===cat.id?800:600,background:wt===cat.id?cat.c:"white",color:wt===cat.id?"white":C.textLight,transition:"all 0.3s ease",boxShadow:wt===cat.id?`0 4px 12px ${cat.c}44`:"none"}}>{cat.e} {cat.l}</button>)}
      </div>

      {addingW?<div style={{marginBottom:12}}>
        <div style={{display:"flex",gap:6,marginBottom:6}}>
          <input value={newW} onChange={e=>setNW(e.target.value)} onKeyDown={e=>e.key==="Enter"&&!newW.trim()?null:e.key==="Enter"&&addWish()} autoFocus placeholder="추가할 항목..."
            style={{flex:1,padding:"9px 12px",borderRadius:12,border:`1px solid ${cc.c}66`,outline:"none",fontFamily:F,fontSize:14,background:"white"}}/>
          <button onClick={addWish} style={{padding:"9px 14px",borderRadius:12,border:"none",background:cc.c,color:"white",fontSize:13,cursor:"pointer",fontWeight:700}}>추가</button>
          <button onClick={()=>{setAW(false);setNW("");setNWL("");}} style={{padding:"9px 10px",borderRadius:12,border:`1px solid ${C.purpleLight}`,background:"none",color:C.textLight,fontSize:12,cursor:"pointer"}}>✕</button>
        </div>
        <input value={newWLink} onChange={e=>setNWL(e.target.value)} placeholder="🔗 링크 (선택)" 
          style={{width:"100%",padding:"7px 12px",borderRadius:10,border:`1px solid ${C.purpleLight}44`,outline:"none",fontFamily:F,fontSize:11,background:C.warm,color:C.textLight}}/>
      </div>:
      <button onClick={()=>setAW(true)} style={{width:"100%",padding:10,borderRadius:14,border:`2px dashed ${cc.c}55`,background:"none",cursor:"pointer",fontFamily:F,fontSize:14,color:cc.c,fontWeight:700,marginBottom:12}}>+ 새로 추가하기</button>}

      <div style={{display:"flex",flexDirection:"column",gap:6}}>
        {pending.map(item=><div key={item.id} style={{display:"flex",alignItems:"center",gap:8,padding:"11px 14px",borderRadius:14,background:"white",boxShadow:"0 1px 6px rgba(0,0,0,0.03)"}}>
          <div onClick={()=>toggleWish(item.id)} style={{width:22,height:22,borderRadius:"50%",flexShrink:0,border:`2px solid ${cc.c}66`,cursor:"pointer"}}/>
          <div style={{flex:1,minWidth:0}}>
            <span style={{fontFamily:F,fontSize:13,fontWeight:600,color:C.text}}>{item.text}</span>
            {item.link&&<a href={item.link} target="_blank" rel="noopener" onClick={e=>e.stopPropagation()} style={{display:"block",fontFamily:F,fontSize:10,color:C.blue,marginTop:2,textDecoration:"none",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>🔗 {item.link.replace(/^https?:\/\//,"").slice(0,40)}</a>}
          </div>
          {item.addedBy&&<PersonTag name={item.addedBy}/>}
          {editMode&&<button onClick={()=>delWish(item.id)} style={{background:C.pink+"18",border:"none",cursor:"pointer",fontSize:13,color:C.pink,padding:"4px 8px",borderRadius:8,fontWeight:700}}>삭제</button>}
        </div>)}
        {pending.length===0&&!addingW&&<div style={{textAlign:"center",padding:"20px 0"}}><p style={{fontFamily:F,fontSize:12,color:C.textSoft}}>아직 항목이 없어요</p></div>}
      </div>

      {done.length>0&&<>
        <button onClick={()=>setSD(!showDone)} style={{background:"none",border:"none",cursor:"pointer",fontFamily:F,fontSize:12,color:C.textSoft,fontWeight:700,padding:"16px 0 8px",display:"flex",alignItems:"center",gap:4}}>
          완료 ({done.length}) {showDone?"▾":"▸"}
        </button>
        {showDone&&<div style={{display:"flex",flexDirection:"column",gap:6}}>
          {done.map(item=><div key={item.id} style={{display:"flex",alignItems:"center",gap:8,padding:"11px 14px",borderRadius:14,background:C.pinkPale+"66",opacity:0.6}}>
            <div onClick={()=>toggleWish(item.id)} style={{width:22,height:22,borderRadius:"50%",flexShrink:0,background:cc.c,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}><span style={{color:"white",fontSize:11}}>✓</span></div>
            <span style={{fontFamily:F,fontSize:12,fontWeight:600,color:C.textLight,flex:1,textDecoration:"line-through"}}>{item.text}</span>
            {item.addedBy&&<PersonTag name={item.addedBy}/>}
          </div>)}
        </div>}
      </>}
    </>}

    {/* ── 약속 ── */}
    {tab==="promise"&&<>
      <SH emoji="🤝" title="우리의 약속" sub="서로 만든 약속, 각자 지키면 +100점"/>

      {addingP?<div style={{display:"flex",gap:6,marginBottom:12}}>
        <input value={newP} onChange={e=>setNP(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addPromise()} autoFocus placeholder="약속 내용..."
          style={{flex:1,padding:"9px 12px",borderRadius:12,border:`1px solid ${C.orange}66`,outline:"none",fontFamily:F,fontSize:14,background:"white"}}/>
        <button onClick={addPromise} style={{padding:"9px 14px",borderRadius:12,border:"none",background:C.orange,color:"white",fontSize:13,cursor:"pointer",fontWeight:700}}>추가</button>
        <button onClick={()=>{setAP(false);setNP("");}} style={{padding:"9px 10px",borderRadius:12,border:`1px solid ${C.purpleLight}`,background:"none",color:C.textLight,fontSize:11,cursor:"pointer"}}>✕</button>
      </div>:
      <button onClick={()=>setAP(true)} style={{width:"100%",padding:10,borderRadius:14,border:`2px dashed ${C.orange}55`,background:"none",cursor:"pointer",fontFamily:F,fontSize:12,color:C.orange,fontWeight:700,marginBottom:12}}>+ 새 약속 만들기</button>}

      <div style={{display:"flex",flexDirection:"column",gap:8}}>
        {pActive.map(item=>{
          const myDone=me==="asimo"?item.doneAsimo:item.doneBunny;
          const partnerDone=me==="asimo"?item.doneBunny:item.doneAsimo;
          return <div key={item.id} style={{padding:"14px",borderRadius:16,background:"white",boxShadow:"0 2px 8px rgba(0,0,0,0.04)"}}>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
              <span style={{fontFamily:F,fontSize:15,fontWeight:700,color:C.text,flex:1}}>{item.text}</span>
              <PersonTag name={item.addedBy}/>
            </div>
            <div style={{display:"flex",gap:6}}>
              <button onClick={()=>togglePromise(item.id)} style={{flex:1,padding:"8px",borderRadius:12,border:"none",cursor:"pointer",fontFamily:F,fontSize:13,fontWeight:700,
                background:myDone?C.mint:C.warm,color:myDone?"white":C.text}}>
                {myDone?"✅ 나 달성!":"나 달성완료"}
              </button>
              <div style={{flex:1,padding:"8px",borderRadius:12,textAlign:"center",fontFamily:F,fontSize:13,fontWeight:700,
                background:partnerDone?C.mint+"44":C.warm+"88",color:partnerDone?C.mint:C.textSoft}}>
                {partnerDone?`✅ ${partnerLabel}`:`⏳ ${partnerLabel}`}
              </div>
              {editMode&&<button onClick={()=>delPromise(item.id)} style={{padding:"8px",borderRadius:12,border:"none",cursor:"pointer",fontFamily:F,fontSize:13,fontWeight:700,background:C.pink+"18",color:C.pink}}>삭제</button>}
            </div>
          </div>;
        })}
        {pActive.length===0&&!addingP&&<div style={{textAlign:"center",padding:"20px 0"}}>
          <span style={{fontSize:32,display:"block",marginBottom:6}}>🤝</span>
          <p style={{fontFamily:F,fontSize:12,color:C.textSoft}}>약속을 만들어보세요</p>
          <p style={{fontFamily:F,fontSize:10,color:C.textSoft}}>둘 다 달성하면 각자 +100점!</p>
        </div>}
      </div>

      {pComplete.length>0&&<>
        <button onClick={()=>setSD(!showDone)} style={{background:"none",border:"none",cursor:"pointer",fontFamily:F,fontSize:12,color:C.textSoft,fontWeight:700,padding:"16px 0 8px",display:"flex",alignItems:"center",gap:4}}>
          둘 다 달성 ({pComplete.length}) {showDone?"▾":"▸"}
        </button>
        {showDone&&<div style={{display:"flex",flexDirection:"column",gap:6}}>
          {pComplete.map(item=><div key={item.id} style={{padding:"12px 14px",borderRadius:14,background:C.mint+"22",opacity:0.6}}>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <span style={{fontSize:14}}>🎉</span>
              <span style={{fontFamily:F,fontSize:12,fontWeight:600,color:C.textLight,flex:1,textDecoration:"line-through"}}>{item.text}</span>
              <PersonTag name={item.addedBy}/>
            </div>
          </div>)}
        </div>}
      </>}
    </>}

    {/* ── 버킷리스트 ── */}
    {tab==="bucket"&&<>
      <SH emoji="🪣" title="버킷리스트" sub="아시모 & 토끼가 함께 이루고 싶은 것들"/>

      {bAllTotal>0&&<div style={{background:"white",borderRadius:16,padding:14,marginBottom:14,textAlign:"center",boxShadow:"0 2px 8px rgba(0,0,0,0.04)"}}>
        <div style={{fontFamily:F,fontSize:28,fontWeight:900,color:C.purple}}>{bAllDone}/{bAllTotal}</div>
        <div style={{height:4,borderRadius:2,background:C.purplePale,margin:"8px auto",maxWidth:160,overflow:"hidden"}}><div style={{height:"100%",borderRadius:2,background:`linear-gradient(90deg,${C.purple},${C.pink})`,width:`${bAllTotal>0?(bAllDone/bAllTotal)*100:0}%`,transition:"width 0.5s ease"}}/></div>
      </div>}

      <div style={{display:"flex",gap:5,marginBottom:14,overflowX:"auto",paddingBottom:2}}>
        {Object.keys(buckets).map(d=>{
          const cnt=buckets[d].length;
          const doneCnt=buckets[d].filter(x=>x.done).length;
          return <button key={d} onClick={()=>setBT(d)} style={{padding:"7px 10px",borderRadius:12,fontSize:11,cursor:"pointer",fontFamily:F,border:"none",fontWeight:bt===d?800:600,background:bt===d?C.purple:"white",color:bt===d?"white":C.textLight,transition:"all 0.3s ease",boxShadow:bt===d?`0 4px 12px ${C.purple}44`:"none",whiteSpace:"nowrap",flexShrink:0}}>
            {d}{cnt>0&&<span style={{display:"block",fontSize:7,marginTop:1,opacity:0.7}}>{doneCnt}/{cnt}</span>}
          </button>;
        })}
      </div>

      {addingB?<div style={{display:"flex",gap:6,marginBottom:12}}>
        <input value={newB} onChange={e=>setNB(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addBucket()} autoFocus placeholder={`${bt} 목표...`}
          style={{flex:1,padding:"9px 12px",borderRadius:12,border:`1px solid ${C.purple}66`,outline:"none",fontFamily:F,fontSize:14,background:"white"}}/>
        <button onClick={addBucket} style={{padding:"9px 14px",borderRadius:12,border:"none",background:C.purple,color:"white",fontSize:13,cursor:"pointer",fontWeight:700}}>추가</button>
        <button onClick={()=>{setAB(false);setNB("");}} style={{padding:"9px 10px",borderRadius:12,border:`1px solid ${C.purpleLight}`,background:"none",color:C.textLight,fontSize:11,cursor:"pointer"}}>✕</button>
      </div>:
      <button onClick={()=>setAB(true)} style={{width:"100%",padding:10,borderRadius:14,border:`2px dashed ${C.purple}55`,background:"none",cursor:"pointer",fontFamily:F,fontSize:12,color:C.purple,fontWeight:700,marginBottom:12}}>+ {bt} 버킷 추가</button>}

      <div style={{display:"flex",flexDirection:"column",gap:6}}>
        {bPending.map((item,idx)=><div key={item.id} style={{display:"flex",alignItems:"center",gap:6,padding:"10px 12px",borderRadius:14,background:"white",boxShadow:"0 1px 6px rgba(0,0,0,0.03)"}}>
          {/* Priority number */}
          <div style={{width:24,height:24,borderRadius:8,background:C.purple+"18",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:F,fontSize:11,fontWeight:900,color:C.purple,flexShrink:0}}>{idx+1}</div>
          {/* Check */}
          <div onClick={()=>toggleBucket(item.id)} style={{width:20,height:20,borderRadius:"50%",flexShrink:0,border:`2px solid ${C.purple}66`,cursor:"pointer"}}/>
          <span style={{fontFamily:F,fontSize:14,fontWeight:600,color:C.text,flex:1}}>{item.text}</span>
          {item.addedBy&&<PersonTag name={item.addedBy}/>}
          {/* Reorder arrows */}
          <div style={{display:"flex",flexDirection:"column",gap:1}}>
            {idx>0&&<button onClick={()=>moveBucket(item.id,-1)} style={{background:"none",border:"none",cursor:"pointer",fontSize:10,color:C.textSoft,padding:0,lineHeight:1}}>▲</button>}
            {idx<bPending.length-1&&<button onClick={()=>moveBucket(item.id,1)} style={{background:"none",border:"none",cursor:"pointer",fontSize:10,color:C.textSoft,padding:0,lineHeight:1}}>▼</button>}
          </div>
          {editMode&&<button onClick={()=>delBucket(item.id)} style={{background:C.pink+"18",border:"none",cursor:"pointer",fontSize:13,color:C.pink,padding:"4px 8px",borderRadius:8,fontWeight:700,marginLeft:4}}>삭제</button>}
        </div>)}
        {bPending.length===0&&!addingB&&<div style={{textAlign:"center",padding:"20px 0"}}><p style={{fontFamily:F,fontSize:12,color:C.textSoft}}>{bt} 버킷이 없어요</p></div>}
      </div>

      {bDone.length>0&&<>
        <button onClick={()=>setSD(!showDone)} style={{background:"none",border:"none",cursor:"pointer",fontFamily:F,fontSize:12,color:C.textSoft,fontWeight:700,padding:"16px 0 8px",display:"flex",alignItems:"center",gap:4}}>
          달성 ({bDone.length}) {showDone?"▾":"▸"}
        </button>
        {showDone&&<div style={{display:"flex",flexDirection:"column",gap:6}}>
          {bDone.map(item=><div key={item.id} style={{display:"flex",alignItems:"center",gap:8,padding:"11px 14px",borderRadius:14,background:C.purplePale+"66",opacity:0.6}}>
            <div onClick={()=>toggleBucket(item.id)} style={{width:22,height:22,borderRadius:"50%",flexShrink:0,background:C.purple,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}><span style={{color:"white",fontSize:11}}>✓</span></div>
            <span style={{fontFamily:F,fontSize:12,fontWeight:600,color:C.textLight,flex:1,textDecoration:"line-through"}}>{item.text}</span>
            {item.addedBy&&<PersonTag name={item.addedBy}/>}
          </div>)}
        </div>}
      </>}
    </>}
  </PW>;
}

// ─── MORE ───────────────────────────────────────────
function MorePage({addPts,me}){
  const [sec,setSec]=useState(null);
  const [notes,setN]=usePersist("more-notes",defaultTasteNotes);const [ap,setAP]=useState(me==="asimo"?"bunny":"asimo");
  const [ei,setEI]=useState(null);const [ev,setEV]=useState("");
  const [addCat,setAC]=useState(false);const [newCat,setNC]=useState("");
  const [coupons,setCP]=usePersist("more-coupons",defaultCoupons);
  const [addCoupon,setACp]=useState(false);
  const myLabel=me==="asimo"?"아시모":"토끼";
  const partnerLabel=me==="asimo"?"토끼":"아시모";
  const [nc,setNCp]=useState({title:"",emoji:"🎁",from:myLabel,to:partnerLabel});
  const [letters,setLT]=usePersist("more-letters",defaultLetters);
  const [addLetter,setAL]=useState(false);
  const [nl,setNL]=useState({text:"",from:me==="asimo"?"아시모":"토끼",openDate:""});
  const [openedLetter,setOL]=useState(null);
  const [showUsed,setSU]=useState(false);
  const [editMode,setEM]=useState(false);
  const F="'Gowun Batang','Nanum Myeongjo',serif";
  const pr=notes[ap];
  const today=new Date().toISOString().split("T")[0];

  const se=(i)=>{setEI(i);setEV(pr.notes[i].value);};
  const setRating=(idx,r)=>setN(p=>({...p,[ap]:{...p[ap],notes:p[ap].notes.map((n,i)=>i===idx?{...n,rating:n.rating===r?0:r}:n)}}));
  const setComment=(idx,txt)=>setN(p=>({...p,[ap]:{...p[ap],notes:p[ap].notes.map((n,i)=>i===idx?{...n,comment:txt}:n)}}));
  const [commentIdx,setCI]=useState(null);
  const [commentText,setCT]=useState("");
  const sv=()=>{if(ei===null)return;const wasEmpty=!pr.notes[ei].value;setN(p=>({...p,[ap]:{...p[ap],notes:p[ap].notes.map((n,i)=>i===ei?{...n,value:ev}:n)}}));setEI(null);if(wasEmpty&&ev.trim())addPts(50);};
  const addNote=()=>{if(!newCat.trim())return;setN(p=>({...p,[ap]:{...p[ap],notes:[...p[ap].notes,{category:newCat.trim(),value:""}]}}));setNC("");setAC(false);};
  const addCp=()=>{if(!nc.title.trim())return;setCP(p=>[...p,{id:Date.now(),...nc,used:false,createdAt:new Date().toISOString().split("T")[0]}]);addPts(100);setNCp({title:"",emoji:"🎁",from:myLabel,to:partnerLabel});setACp(false);};
  const addLt=()=>{if(!nl.text.trim()||!nl.openDate)return;setLT(p=>[...p,{id:Date.now(),...nl,createdAt:today}]);addPts(50);setNL({text:"",from:myLabel,openDate:""});setAL(false);};
  const delCoupon=(id)=>setCP(p=>p.filter(x=>x.id!==id));
  const delLetter=(id)=>setLT(p=>p.filter(x=>x.id!==id));
  const delNote=(idx)=>setN(p=>({...p,[ap]:{...p[ap],notes:p[ap].notes.filter((_,i)=>i!==idx)}}));
  const daysUntil=(d)=>{const diff=Math.ceil((new Date(d)-new Date())/864e5);return diff;};

  const Back=()=><button onClick={()=>{setSec(null);setEI(null);setAC(false);setACp(false);setAL(false);setOL(null);setEM(false);}} style={{background:"none",border:"none",cursor:"pointer",display:"flex",alignItems:"center",gap:4,padding:"0 0 14px",fontFamily:F,fontSize:12,color:C.textLight,fontWeight:700}}>← 더보기</button>;

  if(!sec) return <PW><div style={{height:42}}></div><SH emoji="💝" title="더보기" sub="아시모 & 토끼의 특별 기능들"/>
    <div style={{display:"flex",flexDirection:"column",gap:10}}>
      {[{id:"taste",e:"📝",t:"취향 노트",d:"상대방의 취향을 얼마나 알고 있나요?",c:C.purple},
        {id:"coupons",e:"🎟️",t:"소원권",d:"상대방에게 주는 특별한 쿠폰",c:C.pink},
        {id:"letters",e:"💌",t:"타임캡슐 편지",d:"미래의 우리에게 보내는 편지",c:C.orange}
      ].map(item=><button key={item.id} onClick={()=>setSec(item.id)} style={{display:"flex",alignItems:"center",gap:14,padding:18,borderRadius:18,background:"white",border:"none",cursor:"pointer",textAlign:"left",boxShadow:"0 2px 12px rgba(0,0,0,0.04)"}}>
        <div style={{width:48,height:48,borderRadius:14,flexShrink:0,background:`${item.c}18`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22}}>{item.e}</div>
        <div style={{flex:1}}>
          <div style={{fontFamily:F,fontSize:16,fontWeight:700,color:C.text}}>{item.t}</div>
          <div style={{fontFamily:F,fontSize:13,color:C.textLight,marginTop:1}}>{item.d}</div>
        </div>
        <span style={{fontSize:16,color:C.textSoft}}>›</span>
      </button>)}
    </div>
  </PW>;

  // ── 취향 노트 ──
  if(sec==="taste"){
    const partner=me==="asimo"?"bunny":"asimo";
    // Default to showing partner's notes
    const viewTarget=ap;
    const vt=notes[viewTarget];
    const isPartner=viewTarget!==(me==="asimo"?"asimo":"bunny");
    const meLabel=myLabel;
    return <PW><div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><Back/><button onClick={()=>setEM(!editMode)} style={{padding:"5px 10px",borderRadius:10,border:"none",cursor:"pointer",fontFamily:F,fontSize:11,fontWeight:700,background:editMode?C.pink+"22":C.warm,color:editMode?C.pink:C.textSoft,marginBottom:14}}>{editMode?"완료":"수정"}</button></div><SH emoji="📝" title="취향 노트" sub={`${partnerLabel}의 취향을 얼마나 알고 있나요?`}/>
    
    {/* Who's profile to view */}
    <div style={{display:"flex",gap:10,marginBottom:12,justifyContent:"center"}}>
      {["asimo","bunny"].map(k=>{
        const isMe=k===me;
        return <button key={k} onClick={()=>{setAP(k);setEI(null);}} style={{display:"flex",alignItems:"center",gap:6,padding:"8px 16px",borderRadius:14,cursor:"pointer",border:ap===k?`2px solid ${C.purple}`:"2px solid transparent",background:ap===k?"white":C.warm,fontFamily:F,fontSize:12,fontWeight:700,color:ap===k?C.text:C.textLight}}>
          <span style={{fontSize:16}}>{notes[k].avatar}</span>{notes[k].name}
        </button>;
      })}
    </div>
    
    {/* Hint */}
    <div style={{textAlign:"center",marginBottom:14,padding:"8px 16px",borderRadius:12,background:C.warm}}>
      <span style={{fontFamily:F,fontSize:13,color:C.textLight}}>
        {viewTarget===me
          ?`✏️ 나(${meLabel})의 취향은 상대방이 적어줄 거예요`
          :`💕 내가 알고 있는 ${partnerLabel}의 취향을 적어보세요`}
      </span>
    </div>

    <div style={{display:"flex",flexDirection:"column",gap:8}}>
      {vt.notes.map((note,idx)=><div key={idx} style={{padding:"12px 14px",borderRadius:14,background:"white",border:`2px solid ${ei===idx?C.purpleLight:"transparent"}`,boxShadow:"0 1px 6px rgba(0,0,0,0.03)"}}>
        {/* 카테고리 + 수정/삭제 */}
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <span style={{fontFamily:F,fontSize:13,color:C.purple,fontWeight:800}}>{note.category}</span>
          <div style={{display:"flex",alignItems:"center",gap:6}}>
            {note.value&&ei!==idx&&<span onClick={()=>se(idx)} style={{fontSize:11,color:C.purple,cursor:"pointer"}}>✏️</span>}
            {editMode&&<button onClick={()=>delNote(idx)} style={{padding:"2px 8px",borderRadius:6,border:"none",cursor:"pointer",fontFamily:F,fontSize:10,fontWeight:700,background:C.pink+"18",color:C.pink}}>삭제</button>}
          </div>
        </div>

        {/* 값 입력/표시 */}
        {ei===idx?<div style={{marginTop:8,display:"flex",gap:6}}>
          <input value={ev} onChange={e=>setEV(e.target.value)} onKeyDown={e=>e.key==="Enter"&&sv()} autoFocus placeholder={`${vt.name}의 ${note.category}은?`}
            style={{flex:1,padding:"7px 10px",borderRadius:10,fontSize:13,border:`1px solid ${C.purpleLight}`,outline:"none",background:C.purplePale,fontFamily:F}}/>
          <button onClick={()=>sv()} style={{padding:"7px 12px",borderRadius:10,border:"none",background:C.purple,color:"white",fontSize:12,cursor:"pointer",fontWeight:700}}>저장</button>
        </div>
        :<div onClick={()=>!note.value&&se(idx)} style={{marginTop:4,fontFamily:F,fontSize:14,fontWeight:600,color:note.value?C.text:C.textSoft,fontStyle:note.value?"normal":"italic",cursor:note.value?"default":"pointer"}}>{note.value||"탭해서 입력해보세요"}</div>}

        {/* ⭐ 별점 */}
        {note.value&&<div style={{marginTop:8,display:"flex",alignItems:"center",gap:2}}>
          {[1,2,3,4,5].map(s=><span key={s} onClick={()=>setRating(idx,s)} style={{fontSize:20,cursor:"pointer",color:s<=(note.rating||0)?C.gold:C.purplePale,transition:"color 0.15s"}}>{s<=(note.rating||0)?"★":"☆"}</span>)}
          <span style={{fontFamily:F,fontSize:11,color:C.textSoft,marginLeft:6}}>{note.rating?`${note.rating}/5`:""}</span>
        </div>}

        {/* 💬 코멘트 */}
        {note.value&&note.rating>0&&<div style={{marginTop:6}}>
          {commentIdx===idx?<div style={{display:"flex",gap:6}}>
            <input value={commentText} onChange={e=>setCT(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"){setComment(idx,commentText);setCI(null);}}} autoFocus placeholder="한마디 남기기..."
              style={{flex:1,padding:"6px 10px",borderRadius:8,fontSize:12,border:`1px solid ${C.gold}66`,outline:"none",background:C.warm,fontFamily:F}}/>
            <button onClick={()=>{setComment(idx,commentText);setCI(null);}} style={{padding:"6px 10px",borderRadius:8,border:"none",background:C.gold,color:"white",fontSize:11,cursor:"pointer",fontWeight:700}}>저장</button>
          </div>
          :note.comment?<div onClick={()=>{setCI(idx);setCT(note.comment);}} style={{padding:"6px 10px",borderRadius:8,background:C.warm,cursor:"pointer"}}>
            <span style={{fontFamily:F,fontSize:12,color:C.text}}>💬 {note.comment}</span>
          </div>
          :<button onClick={()=>{setCI(idx);setCT("");}} style={{padding:"5px 10px",borderRadius:8,border:`1px dashed ${C.gold}66`,background:"none",cursor:"pointer",fontFamily:F,fontSize:11,color:C.gold,fontWeight:600}}>💬 코멘트 남기기</button>}
        </div>}
      </div>)}
      {addCat?<div style={{display:"flex",gap:6}}>
        <input value={newCat} onChange={e=>setNC(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addNote()} autoFocus placeholder="새 항목 (예: 좋아하는 계절)"
          style={{flex:1,padding:"9px 12px",borderRadius:12,border:`1px solid ${C.purpleLight}`,outline:"none",fontFamily:F,fontSize:14,background:"white"}}/>
        <button onClick={addNote} style={{padding:"9px 14px",borderRadius:12,border:"none",background:C.purple,color:"white",fontSize:13,cursor:"pointer",fontWeight:700}}>추가</button>
      </div>:
      <button onClick={()=>setAC(true)} style={{padding:12,borderRadius:14,border:`2px dashed ${C.purpleLight}`,background:"none",cursor:"pointer",fontFamily:F,fontSize:12,color:C.purple,fontWeight:700}}>+ 새 항목 추가</button>}
    </div>
  </PW>;}

  // ── 소원권 ──
  if(sec==="coupons"){
    const activeC=coupons.filter(c=>!c.used);
    const usedC=coupons.filter(c=>c.used);
    return <PW><div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><Back/><button onClick={()=>setEM(!editMode)} style={{padding:"5px 10px",borderRadius:10,border:"none",cursor:"pointer",fontFamily:F,fontSize:11,fontWeight:700,background:editMode?C.pink+"22":C.warm,color:editMode?C.pink:C.textSoft,marginBottom:14}}>{editMode?"완료":"수정"}</button></div><SH emoji="🎟️" title="소원권" sub="상대방에게 주는 특별한 쿠폰"/>
    {/* Add form */}
    {addCoupon?<div style={{background:"white",borderRadius:18,padding:16,marginBottom:14,boxShadow:"0 2px 12px rgba(200,162,255,0.1)"}}>
      <div style={{fontFamily:F,fontSize:15,fontWeight:800,color:C.text,marginBottom:10}}>새 소원권</div>
      <input value={nc.title} onChange={e=>setNCp(p=>({...p,title:e.target.value}))} placeholder="소원권 내용 (예: 마사지 30분)"
        style={{width:"100%",padding:"9px 12px",borderRadius:12,border:`1px solid ${C.pinkLight}`,outline:"none",fontFamily:F,fontSize:12,background:C.pinkPale+"44",marginBottom:8}}/>
      <div style={{display:"flex",gap:6,marginBottom:8}}>
        <select value={nc.emoji} onChange={e=>setNCp(p=>({...p,emoji:e.target.value}))}
          style={{padding:"7px 10px",borderRadius:10,border:`1px solid ${C.pinkLight}`,fontFamily:F,fontSize:14,background:"white"}}>
          {["🎁","💆","🍽️","🎬","☕","🤗","⭐","🎵","🛍️","🏖️"].map(e=><option key={e} value={e}>{e}</option>)}
        </select>
        <select value={nc.from} onChange={e=>setNCp(p=>({...p,from:e.target.value,to:e.target.value==="아시모"?"토끼":"아시모"}))}
          style={{flex:1,padding:"7px 10px",borderRadius:10,border:`1px solid ${C.pinkLight}`,fontFamily:F,fontSize:14,background:"white"}}>
          <option value="아시모">아시모 → 토끼</option><option value="토끼">토끼 → 아시모</option>
        </select>
      </div>
      <div style={{display:"flex",gap:6}}>
        <button onClick={()=>setACp(false)} style={{flex:1,padding:"8px",borderRadius:12,border:`1px solid ${C.pinkLight}`,background:"none",color:C.textLight,fontSize:11,cursor:"pointer",fontFamily:F,fontWeight:700}}>취소</button>
        <button onClick={addCp} disabled={!nc.title.trim()} style={{flex:1,padding:"8px",borderRadius:12,border:"none",background:nc.title.trim()?C.pink:C.pinkPale,color:"white",fontSize:11,cursor:"pointer",fontFamily:F,fontWeight:700}}>만들기</button>
      </div>
    </div>:
    <button onClick={()=>setACp(true)} style={{width:"100%",padding:12,borderRadius:16,border:`2px dashed ${C.pinkLight}`,background:"none",cursor:"pointer",fontFamily:F,fontSize:12,color:C.pink,fontWeight:700,marginBottom:14}}>+ 새 소원권 만들기</button>}

    {coupons.length===0&&<div style={{textAlign:"center",padding:"24px 0"}}><span style={{fontSize:36,display:"block",marginBottom:6}}>🎟️</span><p style={{fontFamily:F,fontSize:12,color:C.textSoft}}>아직 소원권이 없어요</p></div>}

    {/* Active coupons */}
    {activeC.length>0&&<div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:12}}>
      {activeC.map(c=><div key={c.id} style={{borderRadius:18,overflow:"hidden",background:"white",boxShadow:"0 2px 8px rgba(0,0,0,0.04)"}}>
        <div style={{display:"flex",alignItems:"stretch"}}>
          <div style={{width:60,flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",background:`linear-gradient(135deg,${C.pinkPale},${C.purplePale})`,borderRight:`2px dashed ${C.pinkLight}`,fontSize:26}}>{c.emoji}</div>
          <div style={{flex:1,padding:"11px 14px"}}>
            <div style={{fontFamily:F,fontSize:13,fontWeight:700,color:C.text}}>{c.title}</div>
            <div style={{fontFamily:F,fontSize:10,color:C.textSoft,marginTop:3}}>{c.from} → {c.to}{c.createdAt&&<span> · {c.createdAt} 발급</span>}</div>
          </div>
          <button onClick={()=>{setCP(p=>p.map(x=>x.id===c.id?{...x,used:true,usedAt:new Date().toISOString().split("T")[0]}:x));}} style={{padding:"0 14px",background:"none",border:"none",cursor:"pointer",fontFamily:F,fontSize:11,fontWeight:800,color:C.pink,borderLeft:`1px solid ${C.pinkPale}`}}>사용</button>
          {editMode&&<button onClick={()=>delCoupon(c.id)} style={{padding:"0 10px",background:C.pink+"18",border:"none",cursor:"pointer",fontFamily:F,fontSize:10,fontWeight:700,color:C.pink}}>삭제</button>}
        </div>
      </div>)}
    </div>}

    {/* Used coupons */}
    {usedC.length>0&&<>
      <button onClick={()=>setSU(!showUsed)} style={{background:"none",border:"none",cursor:"pointer",fontFamily:F,fontSize:12,color:C.textSoft,fontWeight:700,padding:"8px 0",display:"flex",alignItems:"center",gap:4}}>
        사용 완료 ({usedC.length}) {showUsed?"▾":"▸"}
      </button>
      {showUsed&&<div style={{display:"flex",flexDirection:"column",gap:8}}>
        {usedC.map(c=><div key={c.id} style={{borderRadius:18,overflow:"hidden",background:C.pinkPale+"44",opacity:0.55}}>
          <div style={{display:"flex",alignItems:"stretch"}}>
            <div style={{width:60,flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",background:C.pinkPale,borderRight:`2px dashed ${C.pinkLight}`,fontSize:26}}>{c.emoji}</div>
            <div style={{flex:1,padding:"11px 14px"}}>
              <div style={{fontFamily:F,fontSize:13,fontWeight:700,color:C.textLight,textDecoration:"line-through"}}>{c.title}</div>
              <div style={{fontFamily:F,fontSize:10,color:C.textSoft,marginTop:3}}>{c.from} → {c.to}{c.createdAt&&<span> · {c.createdAt} 발급</span>}{c.usedAt&&<span> · {c.usedAt} 사용</span>}</div>
            </div>
            <button onClick={()=>setCP(p=>p.map(x=>x.id===c.id?{...x,used:false,usedAt:null}:x))} style={{padding:"0 12px",background:"none",border:"none",cursor:"pointer",fontFamily:F,fontSize:10,fontWeight:700,color:C.purple,borderLeft:`1px solid ${C.pinkPale}`}}>되돌리기</button>
            {editMode&&<button onClick={()=>delCoupon(c.id)} style={{padding:"0 10px",background:C.pink+"18",border:"none",cursor:"pointer",fontFamily:F,fontSize:10,fontWeight:700,color:C.pink}}>삭제</button>}
          </div>
        </div>)}
      </div>}
    </>}
  </PW>;}

  // ── 타임캡슐 편지 ──
  if(sec==="letters") return <PW bg={`linear-gradient(180deg,${C.purplePale},${C.pinkPale})`}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><Back/><button onClick={()=>setEM(!editMode)} style={{padding:"5px 10px",borderRadius:10,border:"none",cursor:"pointer",fontFamily:F,fontSize:11,fontWeight:700,background:editMode?C.pink+"22":C.warm,color:editMode?C.pink:C.textSoft,marginBottom:14}}>{editMode?"완료":"수정"}</button></div>
    <SH emoji="💌" title="타임캡슐 편지" sub="미래의 우리에게 보내는 편지"/>

    {/* Add letter form */}
    {addLetter?<div style={{background:"white",borderRadius:18,padding:16,marginBottom:16,boxShadow:"0 4px 20px rgba(200,162,255,0.15)"}}>
      <div style={{fontFamily:F,fontSize:15,fontWeight:800,color:C.text,marginBottom:10}}>새 타임캡슐 작성 ✉️</div>
      <textarea value={nl.text} onChange={e=>setNL(p=>({...p,text:e.target.value}))} placeholder="미래의 우리에게 하고 싶은 말..." rows={4}
        style={{width:"100%",padding:12,borderRadius:12,border:`1px solid ${C.purpleLight}`,outline:"none",fontFamily:F,fontSize:12,background:C.purplePale+"44",resize:"none",lineHeight:1.6}}/>
      <div style={{display:"flex",gap:8,marginTop:8}}>
        <div style={{flex:1}}>
          <label style={{fontFamily:F,fontSize:10,color:C.textLight,fontWeight:700,display:"block",marginBottom:3}}>열어볼 날짜</label>
          <input type="date" value={nl.openDate} onChange={e=>setNL(p=>({...p,openDate:e.target.value}))} min={new Date(Date.now()+864e5).toISOString().split("T")[0]}
            style={{width:"100%",padding:"8px 10px",borderRadius:10,border:`1px solid ${C.purpleLight}`,outline:"none",fontFamily:F,fontSize:14,background:"white"}}/>
        </div>
        <div>
          <label style={{fontFamily:F,fontSize:10,color:C.textLight,fontWeight:700,display:"block",marginBottom:3}}>보내는 사람</label>
          <select value={nl.from} onChange={e=>setNL(p=>({...p,from:e.target.value}))}
            style={{padding:"8px 10px",borderRadius:10,border:`1px solid ${C.purpleLight}`,fontFamily:F,fontSize:14,background:"white"}}>
            <option value="아시모">아시모</option><option value="토끼">토끼</option>
          </select>
        </div>
      </div>
      <div style={{display:"flex",gap:6,marginTop:10}}>
        <button onClick={()=>{setAL(false);setNL({text:"",from:"아시모",openDate:""});}} style={{flex:1,padding:"8px",borderRadius:12,border:`1px solid ${C.purpleLight}`,background:"none",color:C.textLight,fontSize:11,cursor:"pointer",fontFamily:F,fontWeight:700}}>취소</button>
        <button onClick={addLt} disabled={!nl.text.trim()||!nl.openDate} style={{flex:1,padding:"8px",borderRadius:12,border:"none",background:(nl.text.trim()&&nl.openDate)?C.purple:C.purplePale,color:"white",fontSize:11,cursor:"pointer",fontFamily:F,fontWeight:700}}>봉인하기 🔒</button>
      </div>
    </div>:
    <button onClick={()=>setAL(true)} style={{width:"100%",padding:14,borderRadius:16,border:`2px dashed ${C.purple}55`,background:"white",cursor:"pointer",fontFamily:F,fontSize:12,color:C.purple,fontWeight:700,marginBottom:16,boxShadow:"0 2px 12px rgba(200,162,255,0.1)"}}>+ 새 타임캡슐 작성하기</button>}

    {letters.length===0&&!addLetter&&<div style={{textAlign:"center",padding:"30px 0"}}>
      <span style={{fontSize:44,display:"block",marginBottom:10}}>💌</span>
      <p style={{fontFamily:F,fontSize:13,color:C.text,fontWeight:600}}>아직 타임캡슐이 없어요</p>
      <p style={{fontFamily:F,fontSize:13,color:C.textLight}}>미래의 특정 날짜에 열어볼 편지를 써보세요</p>
    </div>}

    {/* Letter list */}
    <div style={{display:"flex",flexDirection:"column",gap:10}}>
      {[...letters].sort((a,b)=>a.openDate.localeCompare(b.openDate)).map(lt=>{
        const d=daysUntil(lt.openDate);
        const canOpen=d<=0;
        const isOpened=openedLetter===lt.id;
        return <div key={lt.id} style={{borderRadius:18,background:"white",overflow:"hidden",boxShadow:"0 2px 12px rgba(200,162,255,0.1)"}}>
          <div onClick={()=>{if(canOpen)setOL(isOpened?null:lt.id);}} style={{padding:16,cursor:canOpen?"pointer":"default"}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
              <div style={{display:"flex",alignItems:"center",gap:6}}>
                <span style={{fontSize:18}}>{canOpen?"💌":"🔒"}</span>
                <span style={{fontFamily:F,fontSize:12,fontWeight:700,color:C.text}}>{lt.from}의 편지</span>
              </div>
              <span style={{fontFamily:F,fontSize:12,fontWeight:800,color:canOpen?C.mint:C.pink,background:canOpen?C.mintLight:C.pinkPale,padding:"3px 10px",borderRadius:10}}>
                {canOpen?"열어보기 💕":`D-${d}`}
              </span>
            </div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div style={{fontFamily:F,fontSize:10,color:C.textSoft}}>{lt.createdAt} 작성 → {lt.openDate} 개봉</div>
              {editMode&&<button onClick={(e)=>{e.stopPropagation();delLetter(lt.id);}} style={{padding:"3px 10px",borderRadius:6,border:"none",cursor:"pointer",fontFamily:F,fontSize:10,fontWeight:700,background:C.pink+"18",color:C.pink}}>삭제</button>}
            </div>
            {/* Content - locked or opened */}
            {canOpen&&isOpened&&<div style={{marginTop:12,padding:14,borderRadius:12,background:C.purplePale+"66",animation:"fadeIn 0.3s ease"}}>
              <p style={{fontFamily:F,fontSize:13,fontWeight:600,color:C.text,lineHeight:1.7,margin:0,whiteSpace:"pre-line"}}>{lt.text}</p>
            </div>}
            {!canOpen&&<div style={{marginTop:8,padding:12,borderRadius:12,background:C.purplePale+"44",textAlign:"center"}}>
              <span style={{fontFamily:F,fontSize:11,color:C.textSoft}}>🔐 {lt.openDate}까지 기다려주세요</span>
            </div>}
          </div>
        </div>;
      })}
    </div>
  </PW>;
  return null;
}


// ─── APP ────────────────────────────────────────────
function App(){
  const [splash,setSplash]=useState(true);
  useEffect(()=>{const t=setTimeout(()=>setSplash(false),3000);return()=>clearTimeout(t);},[]);

  const [active,setActive]=useState("home");
  const [pts,setPts]=usePersist("app-pts",{asimo:0,bunny:0});
  const [me,setMe]=usePersist("app-me","asimo");
  const addPts=(n)=>setPts(p=>({...p,[me]:p[me]+n}));

  if(splash) return <div onClick={()=>setSplash(false)} style={{
    position:"fixed",inset:0,zIndex:9999,
    background:"linear-gradient(135deg, #fdf6f0 0%, #fde8e8 30%, #f0e8f8 70%, #fdf6f0 100%)",
    display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",
    cursor:"pointer",fontFamily:"'Gowun Batang','Nanum Myeongjo',serif",
    overflow:"hidden"
  }}>
    <style>{`
      @keyframes bunnyRun { 0%{transform:translateX(-120px) scale(0.8);opacity:0} 40%{opacity:1} 100%{transform:translateX(0) scale(1);opacity:1} }
      @keyframes asimoRun { 0%{transform:translateX(120px) scale(0.8);opacity:0} 40%{opacity:1} 100%{transform:translateX(0) scale(1);opacity:1} }
      @keyframes heartPop { 0%{transform:scale(0);opacity:0} 50%{transform:scale(1.3);opacity:1} 100%{transform:scale(1);opacity:1} }
      @keyframes fadeUp { 0%{transform:translateY(20px);opacity:0} 100%{transform:translateY(0);opacity:1} }
      @keyframes sparkle { 0%,100%{opacity:0.3;transform:scale(0.8)} 50%{opacity:1;transform:scale(1.2)} }
      @keyframes tapHint { 0%,100%{opacity:0.4} 50%{opacity:0.8} }
    `}</style>
    <div style={{position:"absolute",left:"15%",top:"12%",fontSize:10,animation:"sparkle 1.5s ease-in-out infinite",animationDelay:"0.0s",opacity:0.3}}>✨</div>
    <div style={{position:"absolute",left:"72%",top:"18%",fontSize:16,animation:"sparkle 2.5s ease-in-out infinite",animationDelay:"0.25s",opacity:0.3}}>💫</div>
    <div style={{position:"absolute",left:"28%",top:"65%",fontSize:22,animation:"sparkle 3.5s ease-in-out infinite",animationDelay:"0.5s",opacity:0.3}}>🌸</div>
    <div style={{position:"absolute",left:"85%",top:"45%",fontSize:10,animation:"sparkle 1.5s ease-in-out infinite",animationDelay:"0.75s",opacity:0.3}}>💕</div>
    <div style={{position:"absolute",left:"42%",top:"25%",fontSize:16,animation:"sparkle 2.5s ease-in-out infinite",animationDelay:"1.0s",opacity:0.3}}>⭐</div>
