const { useState, useEffect, useCallback } = React;

// ─── Persistent Storage Hook ────────────────────────
function usePersist(key, initial) {
  const [val, setVal] = useState(() => {
    try { const s = localStorage.getItem(key); return s ? JSON.parse(s) : initial; } catch(e) { return initial; }
  });
  const setPersist = useCallback((v) => {
    setVal(prev => {
      const next = typeof v === "function" ? v(prev) : v;
      try { localStorage.setItem(key, JSON.stringify(next)); } catch(e) {}
      return next;
    });
  }, [key]);
  return [val, setPersist, true];
}

// ─── Floating Hearts ────────────────────────────────
function FloatingHearts() {
  return <div style={{position:"absolute",top:0,left:0,right:0,bottom:0,pointerEvents:"none",overflow:"hidden"}}>
    {[0,1,2].map(i=>
      <div key={i} style={{
        position:"absolute",left:`${40+i*10}%`,bottom:0,fontSize:14+i*4,
        animation:`floatUp ${4+i*1.5}s ease-in-out ${i*1.2}s infinite`,opacity:0,
      }}>💕</div>
    )}
  </div>;
}

// ─── HOME ───────────────────────────────────────────
function HomePage({pts,addPts,me,setMe}){
  const [daysPassed,setDP]=useState(0);
  const [daysLeft,setDL]=useState(0);
  const [quote,setQ]=usePersist("home-quote","매일이 너와의 첫날 같고,\n매일이 너와의 영원 같아.");
  const [quoteBy,setQB]=usePersist("home-quoteBy","아시모");
  const [editing,setE]=useState(false);
  const [editText,setET]=useState("");
  const [quotePtsToday,setQPT]=useState(0);
  const [hearts,setHearts]=useState([]);
  const [heartToday,setHT]=useState(0);
  const [ptsAnim,setPA]=useState([]);
  
  useEffect(()=>{
    const n=new Date();
    setDP(Math.floor((n-WEDDING_DATE)/864e5));
    setDL(Math.max(0,Math.floor((HUNDRED-n)/864e5)));
  },[]);

  // 아시모를 누르면 → 토끼 눈에서 출발 → 아시모에게 날아감 → 아시모 +1
  // 토끼를 누르면 → 아시모 눈에서 출발 → 토끼에게 날아감 → 토끼 +1
  const shootHeart=(target,e)=>{
    e.stopPropagation();
    const id=Date.now()+Math.random();
    const emojis=["💕","💗","💖","💘","💝","♥️","🩷"];
    const em=emojis[Math.floor(Math.random()*emojis.length)];
    // target=asimo → starts from bunny(left), flies right
    // target=bunny → starts from asimo(right), flies left
    const dir=target==="asimo"?"R":"L";
    setHearts(p=>[...p,{id,em,dir,target}]);
    if(heartToday<5){
      addPts(1);
      setHT(p=>p+1);
      const pid=id+0.1;
      setPA(p=>[...p,{id:pid,target}]);
      setTimeout(()=>setPA(p=>p.filter(h=>h.id!==pid)),800);
    }
    setTimeout(()=>setHearts(p=>p.filter(h=>h.id!==id)),1200);
  };

  const saveQuote=()=>{if(editText.trim()){setQ(editText.trim());if(quotePtsToday<5){addPts(5);setQPT(p=>p+5);}}setE(false);};

  // Eye positions tuned to the proposal illustration
  // Bunny sits left: eyes ~32% from left, ~48% from top
  // Asimo kneels right: eyes ~66% from left, ~43% from top
  const EYE={bunny:{left:"32%",top:"48%"},asimo:{left:"56%",top:"43%"}};

  return <div style={{height:"100dvh",background:C.bg,position:"relative",overflow:"hidden",display:"flex",flexDirection:"column"}}>
    {/* Hero Image */}
    <div style={{position:"relative",flex:1,overflow:"hidden"}}>
      <div style={{
        position:"absolute",inset:0,
        backgroundImage:`url(${PROPOSAL_IMG})`,
        backgroundSize:"cover",backgroundPosition:"center 25%",
        transform:"scale(1.05)",
      }}/>
      
      {/* Top bar: counters + user toggle */}
      <div style={{position:"absolute",top:0,left:0,right:0,padding:"60px 16px 0",zIndex:5,display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
        <div style={{display:"flex",gap:14,alignItems:"center"}}>
          <div style={{textAlign:"center"}}>
            <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:28,fontWeight:300,color:"white",lineHeight:1,textShadow:"0 2px 10px rgba(0,0,0,0.35)"}}>{daysPassed.toLocaleString()}</div>
            <div style={{fontSize:10,color:"rgba(255,255,255,0.8)",fontFamily:"'Nunito',sans-serif",fontWeight:700,marginTop:2,textShadow:"0 1px 4px rgba(0,0,0,0.3)"}}>함께한 날</div>
          </div>
          <div style={{fontSize:10,color:"rgba(255,255,255,0.6)",textShadow:"0 1px 4px rgba(0,0,0,0.3)"}}>♥</div>
          <div style={{textAlign:"center"}}>
            <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:28,fontWeight:300,color:"rgba(255,255,255,0.85)",lineHeight:1,textShadow:"0 2px 10px rgba(0,0,0,0.3)"}}>{daysLeft.toLocaleString()}</div>
            <div style={{fontSize:10,color:"rgba(255,255,255,0.75)",fontFamily:"'Nunito',sans-serif",fontWeight:700,marginTop:2,textShadow:"0 1px 4px rgba(0,0,0,0.3)"}}>남은 날</div>
          </div>
        </div>
        {/* Current user toggle */}
        <button onClick={()=>setMe(me==="asimo"?"bunny":"asimo")} style={{
          background:"rgba(255,255,255,0.2)",backdropFilter:"blur(6px)",borderRadius:16,padding:"8px 16px",
          border:"1px solid rgba(255,255,255,0.15)",cursor:"pointer",display:"flex",alignItems:"center",gap:6,marginTop:12,
        }}>
          <span style={{fontSize:22}}>{me==="asimo"?"🤖":"🐰"}</span>
          <span style={{fontFamily:"'Nunito',sans-serif",fontSize:13,fontWeight:800,color:"white",textShadow:"0 1px 4px rgba(0,0,0,0.3)"}}>{me==="asimo"?"아시모":"토끼"}</span>
        </button>
      </div>

      {/* Points badges above characters */}
      <div style={{position:"absolute",left:"20%",top:"32%",zIndex:6,pointerEvents:"none",transform:"translateX(-50%)"}}>
        <div style={{background:"rgba(255,255,255,0.25)",backdropFilter:"blur(6px)",borderRadius:18,padding:"6px 14px",display:"inline-flex",alignItems:"center",gap:5,border:"1px solid rgba(255,255,255,0.2)"}}>
          <span style={{fontSize:18}}>🐰</span>
          <span style={{fontFamily:"'Nunito',sans-serif",fontSize:16,fontWeight:900,color:"white",textShadow:"0 1px 6px rgba(0,0,0,0.35)"}}>{pts.bunny.toLocaleString()}</span>
        </div>
      </div>
      <div style={{position:"absolute",left:"72%",top:"28%",zIndex:6,pointerEvents:"none",transform:"translateX(-50%)"}}>
        <div style={{background:"rgba(255,255,255,0.25)",backdropFilter:"blur(6px)",borderRadius:18,padding:"6px 14px",display:"inline-flex",alignItems:"center",gap:5,border:"1px solid rgba(255,255,255,0.2)"}}>
          <span style={{fontSize:18}}>🤖</span>
          <span style={{fontFamily:"'Nunito',sans-serif",fontSize:16,fontWeight:900,color:"white",textShadow:"0 1px 6px rgba(0,0,0,0.35)"}}>{pts.asimo.toLocaleString()}</span>
        </div>
      </div>

      {/* Tap zones - tap a character to send them love */}
      {/* Left = bunny area: tap → asimo's eyes shoot heart → bunny gets pt */}
      <div onClick={(e)=>shootHeart("bunny",e)} style={{position:"absolute",left:0,top:"30%",width:"48%",bottom:"30%",zIndex:4,cursor:"pointer"}}/>
      {/* Right = asimo area: tap → bunny's eyes shoot heart → asimo gets pt */}
      <div onClick={(e)=>shootHeart("asimo",e)} style={{position:"absolute",right:0,top:"30%",width:"48%",bottom:"30%",zIndex:4,cursor:"pointer"}}/>

      {/* Flying hearts - start from OPPOSITE character's eyes, fly to target */}
      {hearts.map(h=>{
        // target=asimo → starts from bunny eyes (left), flies R
        // target=bunny → starts from asimo eyes (right), flies L
        const from=h.target==="asimo"?EYE.bunny:EYE.asimo;
        return <div key={h.id} style={{
          position:"absolute",
          left:from.left,top:from.top,
          fontSize:24,pointerEvents:"none",zIndex:10,
          animation:`heartArc${h.dir} 1.1s cubic-bezier(.25,.46,.45,.94) forwards`,
        }}>{h.em}</div>;
      })}
      {/* +1 popups above target */}
      {ptsAnim.map(p=>(
        <div key={p.id} style={{
          position:"absolute",
          left:p.target==="asimo"?"62%":"20%",
          top:p.target==="asimo"?"22%":"30%",
          pointerEvents:"none",zIndex:11,
          fontFamily:"'Nunito',sans-serif",fontSize:15,fontWeight:900,color:"#ff6b8a",
          animation:"ptsPop 0.8s ease-out forwards",
          textShadow:"0 2px 8px rgba(255,255,255,0.6), 0 1px 4px rgba(0,0,0,0.2)",
        }}>+1</div>
      ))}

      {/* Top gradient */}
      <div style={{position:"absolute",top:0,left:0,right:0,height:"18%",background:"linear-gradient(rgba(0,0,0,0.35), transparent)",pointerEvents:"none"}}/>
      {/* Bottom fade */}
      <div style={{position:"absolute",bottom:0,left:0,right:0,height:"15%",
        background:`linear-gradient(transparent, ${C.bg})`,pointerEvents:"none",
      }}/>
      {/* Title */}
      <div style={{position:"absolute",bottom:8,left:0,right:0,textAlign:"center",zIndex:3,pointerEvents:"none"}}>
        <h1 style={{fontFamily:"'Cormorant Garamond',serif",fontSize:22,fontWeight:300,color:C.text,margin:0,letterSpacing:1,fontStyle:"italic"}}>
          아시모 <span style={{color:C.pink,fontSize:18}}>♥</span> 토끼
        </h1>
        <div style={{fontSize:9,color:C.gold,fontFamily:"'Cormorant Garamond',serif",fontWeight:400,marginTop:0,letterSpacing:3}}>
          Since March 29, 2025
        </div>
      </div>
    </div>

    {/* Bottom - quote */}
    <div style={{flexShrink:0,padding:"2px 16px",paddingBottom:68,position:"relative",zIndex:2}}>
      {editing?
        <div style={{padding:"8px 12px",borderRadius:14,background:"white",boxShadow:"0 2px 12px rgba(232,120,138,0.06)"}}>
          <textarea value={editText} onChange={e=>setET(e.target.value)} autoFocus rows={2}
            style={{width:"100%",background:C.warm,border:"none",outline:"none",resize:"none",borderRadius:10,padding:8,
              fontFamily:"'Cormorant Garamond',serif",fontSize:16,color:C.text,lineHeight:1.5,textAlign:"center",fontStyle:"italic"}}/>
          <div style={{display:"flex",justifyContent:"center",gap:4,marginTop:4}}>
            {["아시모","토끼"].map(n=>
              <button key={n} onClick={()=>setQB(n)} style={{padding:"2px 10px",borderRadius:10,border:"none",cursor:"pointer",fontSize:9,fontWeight:700,
                background:quoteBy===n?C.pinkPale:C.warm,color:quoteBy===n?C.pink:C.textLight,fontFamily:"'Nunito',sans-serif"}}>{n}</button>
            )}
            <button onClick={()=>setE(false)} style={{padding:"2px 10px",borderRadius:10,border:`1px solid ${C.pinkLight}`,background:"none",color:C.textLight,fontSize:9,cursor:"pointer",fontFamily:"'Nunito',sans-serif",fontWeight:700}}>취소</button>
            <button onClick={saveQuote} style={{padding:"2px 10px",borderRadius:10,border:"none",background:C.pink,color:"white",fontSize:9,cursor:"pointer",fontFamily:"'Nunito',sans-serif",fontWeight:700}}>저장</button>
          </div>
        </div>
      :
        <div onClick={()=>{setET(quote);setE(true);}} style={{padding:"6px 14px",borderRadius:12,background:"white",boxShadow:"0 2px 12px rgba(232,120,138,0.04)",textAlign:"center",cursor:"pointer",border:"1px solid rgba(232,120,138,0.04)"}}>
          <p style={{fontFamily:"'Cormorant Garamond',serif",fontSize:14,color:C.text,lineHeight:1.4,margin:0,fontStyle:"italic",whiteSpace:"pre-line"}}>"{quote}"</p>
          <div style={{fontSize:9,color:C.gold,marginTop:1,fontFamily:"'Cormorant Garamond',serif",letterSpacing:1}}>— {quoteBy}가 {quoteBy==="아시모"?"토끼":"아시모"}에게</div>
        </div>
      }
    </div>
  </div>;
}

// ─── MEMORIES ───────────────────────────────────────
function MemoriesPage({addPts}){
  const [tab,setTab]=useState("wedding");
  // Wedding: simple photo list (URLs or placeholders)
  const [photos,setPhotos]=usePersist("mem-photos",[]);
  const [lightbox,setLB]=useState(null); // number for wedding, {tripId,idx} for travel

  // Travel: trips sorted by date
  const [trips,setTrips]=usePersist("mem-trips",defaultTrips);
  const [adding,setAdding]=useState(false);
  const [newTrip,setNT]=useState({date:"",year:"",month:"",country:"",city:"",note:""});
  const [selTrip,setSelTrip]=useState(null);

  // Dates
  const [dates,setDates]=usePersist("mem-dates",[]);
  const [addingDate,setAD]=useState(false);
  const [newDate,setND]=useState({date:"",year:"",month:"",day:"",place:"",note:""});
  const [selDate,setSelDate]=useState(null);
  const [editMode,setEM]=useState(false);

  const delPhoto=(idx)=>setPhotos(p=>p.filter((_,i)=>i!==idx));
  const delDate=(id)=>{setDates(p=>p.filter(d=>d.id!==id));setSelDate(null);};
  const delDateMedia=(dateId,mediaIdx)=>setDates(p=>p.map(d=>d.id===dateId?{...d,media:(d.media||[]).filter((_,i)=>i!==mediaIdx)}:d));
  const delTripMedia=(tripId,mediaIdx)=>setTrips(p=>p.map(t=>t.id===tripId?{...t,media:(t.media||[]).filter((_,i)=>i!==mediaIdx)}:t));
  const sorted=[...trips].sort((a,b)=>b.date.localeCompare(a.date));
  const countries=[...new Set(trips.map(t=>t.country))];

  const addTrip=()=>{
    if(!newTrip.date||!newTrip.country||!newTrip.city)return;
    setTrips(p=>[...p,{id:Date.now(),date:newTrip.date,country:newTrip.country,city:newTrip.city,note:newTrip.note,media:[]}]);
    setNT({date:"",year:"",month:"",country:"",city:"",note:""});
    setAdding(false);
  };

  const addDate=()=>{
    if(!newDate.date||!newDate.place)return;
    setDates(p=>[...p,{id:Date.now(),date:newDate.date,place:newDate.place,note:newDate.note,media:[]}]);
    setND({date:"",year:"",month:"",day:"",place:"",note:""});
    setAD(false);
  };

  const sortedDates=[...dates].sort((a,b)=>b.date.localeCompare(a.date));

  const removeTrip=(id)=>{
    setTrips(p=>p.filter(t=>t.id!==id));
    setSelTrip(null);
  };

  const F="'Nunito',sans-serif";

  return <PW>
    <div style={{display:"flex",justifyContent:"center",gap:8,marginBottom:8}}>
      {[{id:"wedding",l:"결혼식",e:"💒"},{id:"dates",l:"데이트",e:"💑"},{id:"travel",l:"여행",e:"✈️"}].map(t=><button key={t.id} onClick={()=>{setTab(t.id);setEM(false);}} style={{padding:"8px 20px",borderRadius:16,fontSize:12,cursor:"pointer",fontFamily:F,border:"none",fontWeight:tab===t.id?800:600,background:tab===t.id?C.pink:"white",color:tab===t.id?"white":C.textLight,transition:"all 0.3s ease",boxShadow:tab===t.id?`0 4px 16px ${C.pinkLight}`:"none"}}>{t.e} {t.l}</button>)}
      <button onClick={()=>setEM(!editMode)} style={{padding:"5px 12px",borderRadius:10,border:"none",cursor:"pointer",fontFamily:F,fontSize:11,fontWeight:700,background:editMode?C.pink+"22":C.warm,color:editMode?C.pink:C.textSoft}}>{editMode?"완료":"수정"}</button>
    </div>

    {tab==="wedding"&&<>
      <SH emoji="💒" title="우리의 결혼식" sub="2025. 03. 29"/>

      {photos.length>0&&<div style={{textAlign:"center",marginBottom:12}}>
        <span style={{fontFamily:F,fontSize:13,color:C.textLight,fontWeight:700}}>{photos.length}장의 추억</span>
      </div>}

      {/* Photo grid */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6}}>
        {photos.map((p,i)=>(
          <div key={i} style={{aspectRatio:"1",borderRadius:12,overflow:"hidden",cursor:"pointer",background:`url(${p}) center/cover`,transition:"all 0.2s ease",position:"relative"}}
            onClick={()=>!editMode&&setLB(i)}>
            {editMode&&<div onClick={(e)=>{e.stopPropagation();delPhoto(i);}} style={{position:"absolute",inset:0,background:"rgba(0,0,0,0.4)",display:"flex",alignItems:"center",justifyContent:"center"}}>
              <span style={{fontFamily:F,fontSize:12,fontWeight:700,color:"white",background:C.pink,padding:"4px 10px",borderRadius:8}}>삭제</span>
            </div>}
          </div>
        ))}
        {/* Upload placeholder */}
        <label style={{
          aspectRatio:"1",borderRadius:12,
          border:`2px dashed ${C.pinkLight}`,
          display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",
          cursor:"pointer",background:C.pinkPale+"44",
        }}>
          <span style={{fontSize:22,color:C.pink}}>+</span>
          <span style={{fontFamily:F,fontSize:9,color:C.pink,fontWeight:700}}>사진 추가</span>
          <input type="file" accept="image/*" multiple hidden onChange={e=>{
            const files=Array.from(e.target.files||[]);
            files.forEach(f=>{
              const reader=new FileReader();
              reader.onload=ev=>{setPhotos(p=>[...p,ev.target.result]);addPts(10);};
              reader.readAsDataURL(f);
            });
          }}/>
        </label>
      </div>

      {/* Empty state */}
      {photos.length===0&&<div style={{textAlign:"center",padding:"30px 0"}}>
        <span style={{fontSize:40,display:"block",marginBottom:8}}>📸</span>
        <p style={{fontFamily:F,fontSize:13,color:C.textLight,fontWeight:600}}>결혼식 사진을 추가해주세요</p>
        <p style={{fontFamily:F,fontSize:11,color:C.textSoft}}>위의 + 버튼으로 사진을 올릴 수 있어요</p>
      </div>}

      {/* Lightbox */}
      {typeof lightbox==="number"&&<div onClick={()=>setLB(null)} style={{
        position:"fixed",inset:0,zIndex:200,background:"rgba(0,0,0,0.85)",
        display:"flex",alignItems:"center",justifyContent:"center",padding:20,cursor:"pointer",
      }}>
        <img src={photos[lightbox]} style={{maxWidth:"100%",maxHeight:"80vh",borderRadius:12,objectFit:"contain"}} onClick={e=>e.stopPropagation()}/>
        {/* Nav arrows */}
        {lightbox>0&&<button onClick={e=>{e.stopPropagation();setLB(lightbox-1);}} style={{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)",background:"rgba(255,255,255,0.2)",border:"none",borderRadius:"50%",width:36,height:36,cursor:"pointer",color:"white",fontSize:18}}>‹</button>}
        {lightbox<photos.length-1&&<button onClick={e=>{e.stopPropagation();setLB(lightbox+1);}} style={{position:"absolute",right:12,top:"50%",transform:"translateY(-50%)",background:"rgba(255,255,255,0.2)",border:"none",borderRadius:"50%",width:36,height:36,cursor:"pointer",color:"white",fontSize:18}}>›</button>}
        <div style={{position:"absolute",bottom:24,fontFamily:F,fontSize:12,color:"rgba(255,255,255,0.6)"}}>{lightbox+1} / {photos.length}</div>
      </div>}

    </>}

    {tab==="dates"&&<>
      <SH emoji="💑" title="우리의 데이트" sub={dates.length>0?`${dates.length}번의 데이트`:"소중한 데이트를 기록해요"}/>

      {addingDate?<div style={{background:"white",borderRadius:20,padding:18,marginBottom:16,boxShadow:"0 4px 20px rgba(200,162,255,0.1)",border:`1px solid ${C.purpleLight}22`}}>
        <div style={{fontFamily:F,fontSize:18,fontWeight:800,color:C.text,marginBottom:14}}>💑 새 데이트 추가</div>
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          <div>
            <div style={{fontFamily:F,fontSize:10,color:C.textLight,fontWeight:700,marginBottom:5}}>언제?</div>
            <div style={{display:"flex",gap:6}}>
              <select value={newDate.year||""} onChange={e=>setND(p=>({...p,year:e.target.value,date:e.target.value&&p.month&&p.day?`${e.target.value}-${p.month}-${p.day}`:""}))}
                style={{flex:1,padding:"10px 12px",borderRadius:14,border:`1px solid ${C.purpleLight}44`,outline:"none",fontFamily:F,fontSize:13,fontWeight:700,background:C.warm,color:C.text,appearance:"none",textAlign:"center",cursor:"pointer"}}>
                <option value="" disabled>년도</option>
                {Array.from({length:6},(_,i)=>2025+i).map(y=><option key={y} value={y}>{y}년</option>)}
              </select>
              <select value={newDate.month||""} onChange={e=>setND(p=>({...p,month:e.target.value,date:p.year&&e.target.value&&p.day?`${p.year}-${e.target.value}-${p.day}`:""}))}
                style={{flex:1,padding:"10px 12px",borderRadius:14,border:`1px solid ${C.purpleLight}44`,outline:"none",fontFamily:F,fontSize:13,fontWeight:700,background:C.warm,color:C.text,appearance:"none",textAlign:"center",cursor:"pointer"}}>
                <option value="" disabled>월</option>
                {Array.from({length:12},(_,i)=>String(i+1).padStart(2,"0")).map(m=><option key={m} value={m}>{parseInt(m)}월</option>)}
              </select>
              <select value={newDate.day||""} onChange={e=>setND(p=>({...p,day:e.target.value,date:p.year&&p.month&&e.target.value?`${p.year}-${p.month}-${e.target.value}`:""}))}
                style={{flex:1,padding:"10px 12px",borderRadius:14,border:`1px solid ${C.purpleLight}44`,outline:"none",fontFamily:F,fontSize:13,fontWeight:700,background:C.warm,color:C.text,appearance:"none",textAlign:"center",cursor:"pointer"}}>
                <option value="" disabled>일</option>
                {Array.from({length:31},(_,i)=>String(i+1).padStart(2,"0")).map(d=><option key={d} value={d}>{parseInt(d)}일</option>)}
              </select>
            </div>
          </div>
          <div>
            <div style={{fontFamily:F,fontSize:10,color:C.textLight,fontWeight:700,marginBottom:5}}>어디서?</div>
            <input value={newDate.place} onChange={e=>setND(p=>({...p,place:e.target.value}))} placeholder="카페, 레스토랑, 공원..."

          </div>
          <div>
            <div style={{fontFamily:F,fontSize:10,color:C.textLight,fontWeight:700,marginBottom:5}}>한줄 추억 <span style={{color:C.textSoft}}>(선택)</span></div>
            <input value={newDate.note} onChange={e=>setND(p=>({...p,note:e.target.value}))} placeholder="오늘 너무 행복했어 💕"
              style={{width:"100%",padding:"10px 12px",borderRadius:14,border:`1px solid ${C.purpleLight}44`,outline:"none",fontFamily:F,fontSize:13,background:C.warm,color:C.text}}/>
          </div>
          <div style={{display:"flex",gap:8,marginTop:4}}>
            <button onClick={()=>{setAD(false);setND({date:"",year:"",month:"",day:"",place:"",note:""});}} style={{flex:1,padding:"10px",borderRadius:14,border:`1px solid ${C.pinkLight}`,background:"none",color:C.textLight,fontSize:12,cursor:"pointer",fontFamily:F,fontWeight:700}}>취소</button>
            <button onClick={addDate} disabled={!newDate.date||!newDate.place} style={{flex:1,padding:"10px",borderRadius:14,border:"none",background:(!newDate.date||!newDate.place)?C.purplePale:C.pink,color:"white",fontSize:12,cursor:"pointer",fontFamily:F,fontWeight:800,opacity:(!newDate.date||!newDate.place)?0.4:1}}>추가하기</button>
          </div>
        </div>
      </div>:
      <button onClick={()=>setAD(true)} style={{width:"100%",padding:14,borderRadius:18,border:`2px dashed ${C.pink}44`,background:"white",cursor:"pointer",textAlign:"center",fontFamily:F,fontSize:12,color:C.pink,fontWeight:700,marginBottom:16,boxShadow:"0 2px 12px rgba(232,120,138,0.04)"}}>+ 새 데이트 추가</button>}

      {sortedDates.length===0&&!addingDate&&<div style={{textAlign:"center",padding:"30px 0"}}>
        <span style={{fontSize:40,display:"block",marginBottom:8}}>💑</span>
        <p style={{fontFamily:F,fontSize:13,color:C.textLight,fontWeight:600}}>아직 데이트 기록이 없어요</p>
      </div>}

      <div style={{display:"flex",flexDirection:"column",gap:12}}>
        {sortedDates.map(dt=>{
          const isOpen=selDate===dt.id;
          const media=dt.media||[];
          const cover=media[0]||null;
          return <div key={dt.id} style={{borderRadius:20,background:"white",overflow:"hidden",boxShadow:isOpen?"0 6px 24px rgba(200,162,255,0.15)":"0 2px 12px rgba(0,0,0,0.03)",border:`1px solid ${isOpen?C.pinkLight+"66":"transparent"}`,transition:"all 0.3s ease"}}>
            <div onClick={()=>setSelDate(isOpen?null:dt.id)} style={{display:"flex",alignItems:"center",gap:10,padding:"12px 14px",cursor:"pointer"}}>
              <div style={{width:52,height:52,borderRadius:14,flexShrink:0,overflow:"hidden",background:cover?`url(${cover}) center/cover`:C.warm,display:"flex",alignItems:"center",justifyContent:"center"}}>
                {!cover&&<span style={{fontSize:22}}>💑</span>}
              </div>
              <div style={{flex:1}}>
                <div style={{fontFamily:F,fontSize:16,fontWeight:700,color:C.text}}>{dt.place}</div>
                <div style={{fontFamily:F,fontSize:10,color:C.textSoft,marginTop:2}}>{dt.date}</div>
                {dt.note&&<div style={{fontFamily:F,fontSize:13,color:C.textLight,marginTop:2}}>{dt.note}</div>}
              </div>
              <div style={{display:"flex",alignItems:"center",gap:4}}>
                {media.length>0&&<span style={{fontFamily:F,fontSize:9,color:C.textSoft,fontWeight:700}}>{media.length}장</span>}
                <span style={{fontSize:12,color:C.textSoft,transform:isOpen?"rotate(90deg)":"rotate(0)",transition:"transform 0.2s"}}>›</span>
              </div>
            </div>
            {isOpen&&<div style={{padding:"0 14px 14px",animation:"fadeIn 0.3s ease"}}>
              {media.length>0&&<div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:4,marginBottom:10}}>
                {media.map((m,i)=>(
                  <div key={i} style={{aspectRatio:"1",borderRadius:10,overflow:"hidden",cursor:"pointer",background:`url(${m}) center/cover`,position:"relative"}}
                    onClick={()=>!editMode&&setLB({tripId:dt.id,idx:i})}>
                    {editMode&&<div onClick={(e)=>{e.stopPropagation();delDateMedia(dt.id,i);}} style={{position:"absolute",inset:0,background:"rgba(0,0,0,0.4)",display:"flex",alignItems:"center",justifyContent:"center"}}>
                      <span style={{fontFamily:F,fontSize:10,fontWeight:700,color:"white",background:C.pink,padding:"3px 8px",borderRadius:6}}>삭제</span>
                    </div>}
                  </div>
                ))}
              </div>}
              <label style={{display:"flex",alignItems:"center",justifyContent:"center",gap:6,padding:"10px",borderRadius:14,border:`2px dashed ${C.pinkLight}55`,cursor:"pointer",marginBottom:8,background:C.warm+"44"}}>
                <span style={{fontSize:14}}>📸</span>
                <span style={{fontFamily:F,fontSize:11,color:C.pink,fontWeight:700}}>사진 추가</span>
                <input type="file" accept="image/*" multiple hidden onChange={e=>{
                  const files=Array.from(e.target.files||[]);
                  files.forEach(f=>{
                    const reader=new FileReader();
                    reader.onload=ev=>{setDates(p=>p.map(x=>x.id===dt.id?{...x,media:[...(x.media||[]),ev.target.result]}:x));addPts(10);};
                    reader.readAsDataURL(f);
                  });
                }}/>
              </label>
              {editMode&&<button onClick={()=>delDate(dt.id)} style={{padding:"8px 14px",borderRadius:12,border:"none",background:C.pink+"18",color:C.pink,fontSize:12,cursor:"pointer",fontFamily:F,fontWeight:700}}>데이트 삭제</button>}
            </div>}
          </div>;
        })}
      </div>

      {/* Date lightbox - reuses trip lightbox logic */}
      {lightbox&&lightbox.tripId&&(()=>{
        const dt=dates.find(x=>x.id===lightbox.tripId);
        if(!dt)return null;
        const m=dt.media||[];
        const idx=lightbox.idx;
        if(!m[idx])return null;
        return <div onClick={()=>setLB(null)} style={{position:"fixed",inset:0,zIndex:200,background:"rgba(0,0,0,0.9)",display:"flex",alignItems:"center",justifyContent:"center",padding:20,cursor:"pointer"}}>
          <img src={m[idx]} style={{maxWidth:"100%",maxHeight:"80vh",borderRadius:12,objectFit:"contain"}} onClick={e=>e.stopPropagation()}/>
          {idx>0&&<button onClick={e=>{e.stopPropagation();setLB({tripId:lightbox.tripId,idx:idx-1});}} style={{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)",background:"rgba(255,255,255,0.15)",border:"none",borderRadius:"50%",width:40,height:40,cursor:"pointer",color:"white",fontSize:20}}>‹</button>}
          {idx<m.length-1&&<button onClick={e=>{e.stopPropagation();setLB({tripId:lightbox.tripId,idx:idx+1});}} style={{position:"absolute",right:12,top:"50%",transform:"translateY(-50%)",background:"rgba(255,255,255,0.15)",border:"none",borderRadius:"50%",width:40,height:40,cursor:"pointer",color:"white",fontSize:20}}>›</button>}
          <div style={{position:"absolute",top:20,left:0,right:0,textAlign:"center",pointerEvents:"none"}}>
            <span style={{fontFamily:F,fontSize:14,fontWeight:800,color:"white",textShadow:"0 2px 8px rgba(0,0,0,0.5)"}}>{dt.place}</span>
          </div>
          <div style={{position:"absolute",bottom:24,fontFamily:F,fontSize:12,color:"rgba(255,255,255,0.6)"}}>{idx+1} / {m.length}</div>
        </div>;
      })()}
    </>}

    {tab==="travel"&&<>
      <SH emoji="✈️" title="우리의 여행" sub={trips.length>0?`${trips.length}개 도시 · ${countries.length}개 나라`:"함께 걸은 길을 기록해요"}/>

      {/* Add trip form */}
      {adding?<div style={{background:"white",borderRadius:20,padding:18,marginBottom:16,boxShadow:"0 4px 20px rgba(200,162,255,0.1)",border:`1px solid ${C.purpleLight}22`}}>
        <div style={{fontFamily:F,fontSize:18,fontWeight:800,color:C.text,marginBottom:14}}>✈️ 새 여행 추가</div>
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          {/* Date - year + month scrollers */}
          <div>
            <div style={{fontFamily:F,fontSize:10,color:C.textLight,fontWeight:700,marginBottom:5}}>언제 갔나요?</div>
            <div style={{display:"flex",gap:6}}>
              <select value={newTrip.year||""} onChange={e=>setNT(p=>({...p,year:e.target.value,date:e.target.value&&p.month?`${e.target.value}-${p.month}`:""}))}
                style={{flex:1,padding:"10px 12px",borderRadius:14,border:`1px solid ${C.purpleLight}44`,outline:"none",fontFamily:F,fontSize:13,fontWeight:700,background:C.warm,color:C.text,appearance:"none",textAlign:"center",cursor:"pointer"}}>
                <option value="" disabled>년도</option>
                {Array.from({length:6},(_,i)=>2025+i).map(y=><option key={y} value={y}>{y}년</option>)}
              </select>
              <select value={newTrip.month||""} onChange={e=>setNT(p=>({...p,month:e.target.value,date:p.year&&e.target.value?`${p.year}-${e.target.value}`:""}))}
                style={{flex:1,padding:"10px 12px",borderRadius:14,border:`1px solid ${C.purpleLight}44`,outline:"none",fontFamily:F,fontSize:13,fontWeight:700,background:C.warm,color:C.text,appearance:"none",textAlign:"center",cursor:"pointer"}}>
                <option value="" disabled>월</option>
                {Array.from({length:12},(_,i)=>String(i+1).padStart(2,"0")).map(m=><option key={m} value={m}>{parseInt(m)}월</option>)}
              </select>
            </div>
          </div>
          {/* Country + City */}
          <div style={{display:"flex",gap:8}}>
            <div style={{flex:1}}>
              <div style={{fontFamily:F,fontSize:10,color:C.textLight,fontWeight:700,marginBottom:5}}>나라</div>
              <input value={newTrip.country} onChange={e=>setNT(p=>({...p,country:e.target.value}))} placeholder="프랑스"
                style={{width:"100%",padding:"10px 12px",borderRadius:14,border:`1px solid ${C.purpleLight}44`,outline:"none",fontFamily:F,fontSize:13,background:C.warm,color:C.text}}/>
            </div>
            <div style={{flex:1}}>
              <div style={{fontFamily:F,fontSize:10,color:C.textLight,fontWeight:700,marginBottom:5}}>도시</div>
              <input value={newTrip.city} onChange={e=>setNT(p=>({...p,city:e.target.value}))} placeholder="파리"
                style={{width:"100%",padding:"10px 12px",borderRadius:14,border:`1px solid ${C.purpleLight}44`,outline:"none",fontFamily:F,fontSize:13,background:C.warm,color:C.text}}/>
            </div>
          </div>
          {/* Note */}
          <div>
            <div style={{fontFamily:F,fontSize:10,color:C.textLight,fontWeight:700,marginBottom:5}}>한줄 추억 <span style={{color:C.textSoft}}>(선택)</span></div>
            <input value={newTrip.note} onChange={e=>setNT(p=>({...p,note:e.target.value}))} placeholder="프러포즈의 도시 ✨"
              style={{width:"100%",padding:"10px 12px",borderRadius:14,border:`1px solid ${C.purpleLight}44`,outline:"none",fontFamily:F,fontSize:13,background:C.warm,color:C.text}}/>
          </div>
          {/* Buttons */}
          <div style={{display:"flex",gap:8,marginTop:4}}>
            <button onClick={()=>{setAdding(false);setNT({date:"",year:"",month:"",country:"",city:"",note:""});}} style={{flex:1,padding:"10px",borderRadius:14,border:`1px solid ${C.pinkLight}`,background:"none",color:C.textLight,fontSize:12,cursor:"pointer",fontFamily:F,fontWeight:700}}>취소</button>
            <button onClick={addTrip} disabled={!newTrip.date||!newTrip.country||!newTrip.city} style={{flex:1,padding:"10px",borderRadius:14,border:"none",background:(!newTrip.date||!newTrip.country||!newTrip.city)?C.purplePale:C.pink,color:"white",fontSize:12,cursor:"pointer",fontFamily:F,fontWeight:800,opacity:(!newTrip.date||!newTrip.country||!newTrip.city)?0.4:1,transition:"all 0.2s ease"}}>추가하기</button>
          </div>
        </div>
      </div>:
      <button onClick={()=>setAdding(true)} style={{width:"100%",padding:14,borderRadius:18,border:`2px dashed ${C.pink}44`,background:"white",cursor:"pointer",textAlign:"center",fontFamily:F,fontSize:12,color:C.pink,fontWeight:700,marginBottom:16,boxShadow:"0 2px 12px rgba(232,120,138,0.04)"}}>+ 새 여행 추가</button>}

      {/* Trip list */}
      {sorted.length===0&&!adding&&<div style={{textAlign:"center",padding:"30px 0"}}>
        <span style={{fontSize:40,display:"block",marginBottom:8}}>✈️</span>
        <p style={{fontFamily:F,fontSize:13,color:C.textLight,fontWeight:600}}>아직 여행 기록이 없어요</p>
      </div>}

      <div style={{display:"flex",flexDirection:"column",gap:12}}>
        {sorted.map(t=>{
          const isOpen=selTrip===t.id;
          const media=t.media||[];
          const cover=media[0]||null;
          return <div key={t.id} style={{
            borderRadius:20,background:"white",overflow:"hidden",
            boxShadow:isOpen?"0 6px 24px rgba(200,162,255,0.15)":"0 2px 12px rgba(0,0,0,0.03)",
            border:`1px solid ${isOpen?C.pinkLight+"66":"transparent"}`,
            transition:"all 0.3s ease",
          }}>
            {/* Header - always visible */}
            <div onClick={()=>setSelTrip(isOpen?null:t.id)} style={{display:"flex",alignItems:"center",gap:10,padding:"12px 14px",cursor:"pointer"}}>

                width:52,height:52,borderRadius:14,flexShrink:0,overflow:"hidden",
